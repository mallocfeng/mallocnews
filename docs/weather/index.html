<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天气 · Immersive Forecast</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    overflow: hidden;
    background: #0a0e1a;
    color: #fff;
  }

  #canvas3d { position: fixed; top: 0; left: 0; z-index: 0; }

  .ui-layer {
    position: relative; z-index: 10;
    width: 100%; height: 100vh;
    display: flex; flex-direction: column;
  }

  /* ---- top bar ---- */
  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px 0;
    flex-shrink: 0;
  }
  .logo { font-size: 1.1rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; opacity: 0.5; }
  .clock { font-size: 0.85rem; opacity: 0.5; font-variant-numeric: tabular-nums; }

  /* ---- city selector ---- */
  .city-nav {
    display: flex; gap: 6px; padding: 16px 24px 0;
    overflow-x: auto; flex-shrink: 0;
  }
  .city-btn {
    padding: 6px 18px; border-radius: 20px;
    border: 1.5px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.65);
    font-size: 0.88rem; font-weight: 500;
    cursor: pointer; white-space: nowrap;
    transition: all 0.4s ease;
    font-family: inherit;
  }
  .city-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
  .city-btn.active {
    background: rgba(255,255,255,0.18);
    border-color: rgba(255,255,255,0.4);
    color: #fff;
    box-shadow: 0 0 20px rgba(255,255,255,0.08);
  }

  /* ---- main content ---- */
  .main-content {
    flex: 1; display: flex; flex-direction: column;
    padding: 12px 24px 20px;
    justify-content: center;
  }

  /* ---- weather hero ---- */
  .hero {
    display: flex; align-items: flex-end; gap: 16px;
    margin-bottom: 8px;
  }
  .hero-temp {
    font-size: 7vw; font-weight: 200; line-height: 0.9;
    max-width: 340px;
  }
  .hero-unit { font-size: 2vw; vertical-align: super; opacity: 0.5; margin-left: -2px; }
  .hero-meta { display: flex; flex-direction: column; gap: 4px; padding-bottom: 14px; }
  .hero-city { font-size: 2vw; font-weight: 700; }
  .hero-desc { font-size: 1vw; opacity: 0.55; font-weight: 300; }

  /* ---- metrics ---- */
  .metrics {
    display: flex; gap: 24px; flex-wrap: wrap;
    padding: 20px 0;
  }
  .metric {
    display: flex; flex-direction: column; gap: 2px;
  }
  .metric-val { font-size: 1.3rem; font-weight: 700; }
  .metric-label { font-size: 0.72rem; opacity: 0.4; text-transform: uppercase; letter-spacing: 1px; }

  /* ---- divider ---- */
  .divider { height: 1px; background: rgba(255,255,255,0.08); margin: 8px 0 16px; }

  /* ---- forecast ---- */
  .forecast-section { display: flex; flex-direction: column; gap: 16px; flex-shrink: 0; }
  .section-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.35; }

  .hourly-scroll {
    display: flex; gap: 16px; overflow-x: auto;
    padding-bottom: 4px; -webkit-overflow-scrolling: touch;
  }
  .hourly-scroll::-webkit-scrollbar { height: 2px; }
  .hourly-scroll::-webkit-scrollbar-track { background: transparent; }
  .hourly-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

  .h-item {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    min-width: 52px;
  }
  .h-item .ht { font-size: 0.75rem; opacity: 0.45; }
  .h-item .hi { font-size: 1.1rem; }
  .h-item .hv { font-size: 0.95rem; font-weight: 600; }

  .daily-scroll {
    display: flex; gap: 12px; overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .daily-scroll::-webkit-scrollbar { height: 2px; }
  .daily-scroll::-webkit-scrollbar-track { background: transparent; }
  .daily-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

  .d-item {
    display: flex; align-items: center; gap: 12px;
    min-width: 200px;
    padding: 10px 0;
  }
  .d-item .dl { font-size: 0.85rem; min-width: 36px; opacity: 0.6; }
  .d-item .di { font-size: 1.1rem; min-width: 28px; text-align: center; }
  .d-bar-wrap { flex: 1; display: flex; align-items: center; gap: 8px; }
  .d-bar-outer {
    flex: 1; height: 3px; background: rgba(255,255,255,0.08);
    border-radius: 2px; position: relative; overflow: hidden;
  }
  .d-bar-inner {
    position: absolute; top: 0; height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, #5b8cf7, #f7c948);
  }
  .d-item .dlo { font-size: 0.8rem; opacity: 0.4; min-width: 28px; text-align: right; }
  .d-item .dhi { font-size: 0.8rem; font-weight: 700; min-width: 28px; }

  /* loading */
  .loading-overlay {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(10,14,26,0.85);
    z-index: 999; pointer-events: none;
    opacity: 0; transition: opacity 0.4s;
  }
  .loading-overlay.show { opacity: 1; pointer-events: auto; }
  .spinner {
    width: 36px; height: 36px;
    border: 2px solid rgba(255,255,255,0.15);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    .hero-temp { font-size: 18vw; }
    .hero-unit { font-size: 8vw; }
    .hero-city { font-size: 6vw; }
    .hero-desc { font-size: 3.5vw; }
    .metric-val { font-size: 1.1rem; }
    .top-bar { padding: 12px 16px 0; }
    .city-nav { padding: 12px 16px 0; }
    .main-content { padding: 8px 16px 12px; }
  }
</style>
</head>
<body>

<canvas id="canvas3d"></canvas>

<div class="ui-layer">
  <div class="top-bar">
    <div class="logo">天气预报</div>
    <div class="clock" id="clock"></div>
  </div>

  <div class="city-nav" id="cityNav"></div>

  <div class="main-content">
    <div class="hero">
      <div class="hero-temp"><span id="heroTemp">--</span><span class="hero-unit">°C</span></div>
      <div class="hero-meta">
        <div class="hero-city" id="heroCity"></div>
        <div class="hero-desc" id="heroDesc"></div>
      </div>
    </div>

    <div class="metrics" id="metrics"></div>

    <div class="divider"></div>

    <div class="forecast-section">
      <div>
        <div class="section-label" style="margin-bottom:10px">逐时</div>
        <div class="hourly-scroll" id="hourlyScroll"></div>
      </div>
      <div>
        <div class="section-label" style="margin-bottom:6px">7 日</div>
        <div class="daily-scroll" id="dailyScroll"></div>
      </div>
    </div>
  </div>
</div>

<div class="loading-overlay" id="loading"><div class="spinner"></div></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
    "gsap": "https://unpkg.com/gsap@3.13.0/index.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { gsap } from 'gsap';

// ============================================================
// CONFIG
// ============================================================
const CITIES = [
  { name:'苏州', lat:31.30, lon:120.58 },
  { name:'北京', lat:39.90, lon:116.41 },
  { name:'上海', lat:31.23, lon:121.47 },
  { name:'广州', lat:23.13, lon:113.26 },
  { name:'深圳', lat:22.54, lon:114.06 },
  { name:'成都', lat:30.57, lon:104.07 },
  { name:'杭州', lat:30.25, lon:120.17 },
  { name:'南京', lat:32.06, lon:118.80 },
  { name:'武汉', lat:30.59, lon:114.31 },
  { name:'西安', lat:34.27, lon:108.94 },
];

const WMO_TO_TYPE = {
  0:'clear', 1:'clear', 2:'cloudy', 3:'overcast',
  45:'fog', 48:'fog',
  51:'drizzle', 53:'drizzle', 55:'drizzle',
  56:'sleet', 57:'sleet',
  61:'rain', 63:'rain', 65:'heavyRain',
  66:'sleet', 67:'sleet',
  71:'snow', 73:'snow', 75:'heavySnow',
  77:'snow', 80:'rain', 81:'rain', 82:'heavyRain',
  85:'snow', 86:'heavySnow',
  95:'storm', 96:'storm', 99:'storm',
};

const TYPE_INFO = {
  clear:      { icon:'☀️', label:'晴', scene:'clear' },
  cloudy:     { icon:'⛅', label:'多云', scene:'cloudy' },
  overcast:   { icon:'☁️', label:'阴', scene:'overcast' },
  fog:        { icon:'🌫️', label:'雾', scene:'fog' },
  drizzle:    { icon:'🌦️', label:'小雨', scene:'rain' },
  rain:       { icon:'🌧️', label:'雨', scene:'rain' },
  heavyRain:  { icon:'🌧️', label:'大雨', scene:'heavyRain' },
  sleet:      { icon:'🌨️', label:'雨夹雪', scene:'sleet' },
  snow:       { icon:'🌨️', label:'雪', scene:'snow' },
  heavySnow:  { icon:'❄️', label:'大雪', scene:'heavySnow' },
  storm:      { icon:'⛈️', label:'雷暴', scene:'storm' },
};

// ============================================================
// THREE.JS SCENE
// ============================================================
const canvas = document.getElementById('canvas3d');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 2, 0);
camera.lookAt(0, 1, -10);

let currentScene = 'clear';

// ============================================================
// SCENE BACKGROUNDS
// ============================================================
const SCENE_BG = {
  clear:    { bg: 0x1a4a7a, fog: 0x1a4a7a },
  cloudy:   { bg: 0x3a3f5a, fog: 0x3a3f5a },
  overcast: { bg: 0x2a2e42, fog: 0x2a2e42 },
  fog:      { bg: 0x4a4f5a, fog: 0x4a4f5a },
  rain:     { bg: 0x0f1a28, fog: 0x0f1a28 },
  heavyRain:{ bg: 0x0a0f1a, fog: 0x0a0f1a },
  snow:     { bg: 0x5a6578, fog: 0x5a6578 },
  heavySnow:{ bg: 0x4a5568, fog: 0x4a5568 },
  sleet:    { bg: 0x3a4558, fog: 0x3a4558 },
  storm:    { bg: 0x060a12, fog: 0x060a12 },
};

function setSceneBg(s) {
  const info = SCENE_BG[s] || SCENE_BG.clear;
  scene.background = new THREE.Color(info.bg);
  scene.fog = new THREE.FogExp2(info.fog, 0.008);
}
setSceneBg('clear');

// ============================================================
// LIGHTING
// ============================================================
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.4);
dirLight.position.set(5, 10, 5);
scene.add(dirLight);

// ============================================================
// 3D PARTICLE SYSTEMS
// ============================================================
// --- TEXTURE GENERATION ---
function createParticleTexture(size = 64, softness = 0.5) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const g = c.getContext('2d');
  const grad = g.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  grad.addColorStop(0, 'rgba(255,255,255,1)');
  grad.addColorStop(softness, 'rgba(255,255,255,0.8)');
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  g.fillStyle = grad;
  g.fillRect(0, 0, size, size);
  return new THREE.CanvasTexture(c);
}

function createLineTexture() {
  const c = document.createElement('canvas');
  c.width = 8; c.height = 128;
  const g = c.getContext('2d');
  const grad = g.createLinearGradient(4, 0, 4, 128);
  grad.addColorStop(0, 'rgba(255,255,255,0.8)');
  grad.addColorStop(0.7, 'rgba(200,210,240,0.5)');
  grad.addColorStop(1, 'rgba(200,210,240,0)');
  g.fillStyle = grad;
  g.fillRect(0, 0, 8, 128);
  return new THREE.CanvasTexture(c);
}

// --- Rain ---
const rainGeo = new THREE.BufferGeometry();
const rainCount = 24000;
const rainPos = new Float32Array(rainCount * 3);
const rainVel = new Float32Array(rainCount);
for (let i = 0; i < rainCount; i++) {
  rainPos[i*3]   = (Math.random() - 0.5) * 120;
  rainPos[i*3+1] = Math.random() * 80 + 5;
  rainPos[i*3+2] = (Math.random() - 0.5) * 120;
  rainVel[i] = 0.6 + Math.random() * 1.2;
}
rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPos, 3));
const rainMat = new THREE.PointsMaterial({
  map: createLineTexture(), size: 1.2, transparent: true, opacity: 0.65,
  blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true,
});
const rainSystem = new THREE.Points(rainGeo, rainMat);
scene.add(rainSystem);
rainSystem.visible = false;

function updateRain() {
  const pos = rainGeo.attributes.position.array;
  for (let i = 0; i < rainCount; i++) {
    pos[i*3+1] -= rainVel[i] * 1.5;
    pos[i*3]   -= 0.05;
    if (pos[i*3+1] < -2) {
      pos[i*3]   = (Math.random()-0.5)*120;
      pos[i*3+1] = 80 + Math.random()*10;
      pos[i*3+2] = (Math.random()-0.5)*120;
    }
  }
  rainGeo.attributes.position.needsUpdate = true;
}

// --- Heavy Rain ---
const hRainGeo = new THREE.BufferGeometry();
const hRainCount = 35000;
const hRainPos = new Float32Array(hRainCount * 3);
const hRainVel = new Float32Array(hRainCount);
for (let i = 0; i < hRainCount; i++) {
  hRainPos[i*3]   = (Math.random()-0.5) * 140;
  hRainPos[i*3+1] = Math.random() * 80 + 5;
  hRainPos[i*3+2] = (Math.random()-0.5) * 140;
  hRainVel[i] = 0.9 + Math.random() * 1.4;
}
hRainGeo.setAttribute('position', new THREE.BufferAttribute(hRainPos, 3));
const hRainMat = new THREE.PointsMaterial({
  map: createLineTexture(), size: 1.5, transparent:true, opacity:0.75,
  blending: THREE.AdditiveBlending, depthWrite:false, sizeAttenuation:true,
});
const hRainSystem = new THREE.Points(hRainGeo, hRainMat);
scene.add(hRainSystem);
hRainSystem.visible = false;

function updateHRain() {
  const pos = hRainGeo.attributes.position.array;
  for (let i = 0; i < hRainCount; i++) {
    pos[i*3+1] -= hRainVel[i] * 1.8;
    pos[i*3]   -= 0.1;
    if (pos[i*3+1] < -2) {
      pos[i*3]   = (Math.random()-0.5)*140;
      pos[i*3+1] = 80 + Math.random()*10;
      pos[i*3+2] = (Math.random()-0.5)*140;
    }
  }
  hRainGeo.attributes.position.needsUpdate = true;
}

// --- Snow ---
const snowGeo = new THREE.BufferGeometry();
const snowCount = 12000;
const snowPos = new Float32Array(snowCount * 3);
const snowSize = new Float32Array(snowCount);
const snowPhase = new Float32Array(snowCount);
for (let i = 0; i < snowCount; i++) {
  snowPos[i*3]   = (Math.random()-0.5) * 100;
  snowPos[i*3+1] = Math.random() * 60 + 5;
  snowPos[i*3+2] = (Math.random()-0.5) * 100;
  snowSize[i] = 1.5 + Math.random() * 3;
  snowPhase[i] = Math.random() * Math.PI * 2;
}
snowGeo.setAttribute('position', new THREE.BufferAttribute(snowPos, 3));
snowGeo.setAttribute('size', new THREE.BufferAttribute(snowSize, 1));
const snowMat = new THREE.PointsMaterial({
  map: createParticleTexture(64, 0.6), size: 3, transparent:true, opacity:0.85,
  blending: THREE.AdditiveBlending, depthWrite:false, sizeAttenuation:true,
  color: 0xeef3ff,
});
const snowSystem = new THREE.Points(snowGeo, snowMat);
scene.add(snowSystem);
snowSystem.visible = false;

let snowTime = 0;
function updateSnow() {
  snowTime += 0.016;
  const pos = snowGeo.attributes.position.array;
  for (let i = 0; i < snowCount; i++) {
    pos[i*3]   += Math.sin(snowTime + snowPhase[i]) * 0.04 + 0.02;
    pos[i*3+1] -= 0.15;
    pos[i*3+2] += Math.cos(snowTime + snowPhase[i] * 0.7) * 0.03;
    if (pos[i*3+1] < -2) {
      pos[i*3]   = (Math.random()-0.5)*100;
      pos[i*3+1] = 60 + Math.random()*10;
      pos[i*3+2] = (Math.random()-0.5)*100;
    }
  }
  snowGeo.attributes.position.needsUpdate = true;
}

// --- Floating particles (clear/night ambiance) ---
const floatGeo = new THREE.BufferGeometry();
const floatCount = 200;
const floatPos = new Float32Array(floatCount * 3);
const floatSizes = new Float32Array(floatCount);
for (let i = 0; i < floatCount; i++) {
  floatPos[i*3]   = (Math.random()-0.5)*80;
  floatPos[i*3+1] = Math.random()*40 + 2;
  floatPos[i*3+2] = -30 + (Math.random()-0.5)*60;
  floatSizes[i] = 2 + Math.random()*4;
}
floatGeo.setAttribute('position', new THREE.BufferAttribute(floatPos, 3));
floatGeo.setAttribute('size', new THREE.BufferAttribute(floatSizes, 1));
const floatMat = new THREE.PointsMaterial({
  map: createParticleTexture(64, 0.7), size: 3, transparent:true, opacity:0.25,
  depthWrite:false, sizeAttenuation:true, color: 0xffffff,
});
const floatSystem = new THREE.Points(floatGeo, floatMat);
scene.add(floatSystem);
floatSystem.visible = false;

function updateFloat(t) {
  const pos = floatGeo.attributes.position.array;
  for (let i = 0; i < floatCount; i++) {
    pos[i*3]   += Math.sin(t*0.001 + i) * 0.01;
    pos[i*3+1] += Math.cos(t*0.0008 + i*0.5) * 0.008;
  }
  floatGeo.attributes.position.needsUpdate = true;
}

// --- Ground plane ---
const groundGeo = new THREE.PlaneGeometry(200, 200);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x1a1a2a, transparent: true, opacity: 0.3, roughness: 0.8
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -3;
scene.add(ground);

// --- Cloud spheres ---
const cloudGroup = new THREE.Group();
scene.add(cloudGroup);
cloudGroup.visible = false;

function buildClouds() {
  while (cloudGroup.children.length) cloudGroup.remove(cloudGroup.children[0]);
  const cloudMat = new THREE.MeshStandardMaterial({
    color: 0x8899bb, transparent: true, opacity: 0.12, roughness: 1
  });
  for (let i = 0; i < 20; i++) {
    const r = 8 + Math.random() * 18;
    const g = new THREE.SphereGeometry(r, 8, 6);
    const m = new THREE.Mesh(g, cloudMat.clone());
    m.material.opacity = 0.04 + Math.random() * 0.1;
    m.position.set((Math.random()-0.5)*120, 25 + Math.random()*25, -20 + (Math.random()-0.5)*80);
    m.scale.set(1, 0.35 + Math.random()*0.2, 1);
    cloudGroup.add(m);
  }
}
buildClouds();

let cloudAnimId = null;
function animateClouds() {
  cloudGroup.children.forEach((m, i) => {
    m.position.x += 0.02 + i * 0.003;
    if (m.position.x > 65) m.position.x = -65;
  });
  if (cloudGroup.visible) requestAnimationFrame(animateClouds);
}

// ============================================================
// SCENE SWITCH
// ============================================================
let currentCloudAnim = null;
function switchScene(type) {
  const t = TYPE_INFO[type];
  if (!t) return;
  const sceneName = t.scene;

  if (sceneName === currentScene) return;
  currentScene = sceneName;

  // visibility
  rainSystem.visible = (sceneName === 'rain');
  hRainSystem.visible = (sceneName === 'heavyRain');
  snowSystem.visible = (sceneName === 'snow' || sceneName === 'heavySnow');
  cloudGroup.visible = (sceneName === 'cloudy' || sceneName === 'overcast' || sceneName === 'fog' || sceneName === 'storm');

  // background
  setSceneBg(sceneName);

  // fog density
  const fogDensities = {
    clear:0.006, cloudy:0.009, overcast:0.012, fog:0.03,
    rain:0.01, heavyRain:0.015, snow:0.008, heavySnow:0.01, sleet:0.009, storm:0.018
  };
  scene.fog.density = fogDensities[sceneName] || 0.008;

  // clouds
  if (cloudGroup.visible && currentCloudAnim) {
    cancelAnimationFrame(currentCloudAnim);
  }
  if (cloudGroup.visible) {
    animateClouds();
  }

  // GSAP transitions
  gsap.to(camera.position, { y: 2 + Math.random()*0.5, duration: 1.5, ease:'power2.inOut' });
}

// ============================================================
// WEATHER API
// ============================================================
async function fetchWeather(city) {
  const { lat, lon } = city;
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,wind_direction_10m,pressure_msl,visibility&hourly=weather_code,temperature_2m&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=8`;
  const res = await fetch(url);
  return res.json();
}

// ============================================================
// WMO -> info
// ============================================================
function wmoToInfo(code) {
  return TYPE_INFO[WMO_TO_TYPE[code]] || { icon:'🌡️', label:'未知', scene:'clear' };
}

function formatTime(iso) {
  const d = new Date(iso);
  return `${String(d.getHours()).padStart(2,'0')}:00`;
}

function formatDay(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const days = ['周日','周一','周二','周三','周四','周五','周六'];
  return days[d.getDay()];
}

const windDirs = ['北','东北','东','东南','南','西南','西','西北'];
function dirToLabel(deg) { return windDirs[(Math.round(deg/22.5)+1) % 8] + '风'; }

// ============================================================
// RENDER
// ============================================================
let isNight = false;
let prevTemp = 0;

function renderCityButtons() {
  const nav = document.getElementById('cityNav');
  nav.innerHTML = CITIES.map((c,i) =>
    `<button class="city-btn ${i===currentCity?'active':''}" data-i="${i}">${c.name}</button>`
  ).join('');
  nav.querySelectorAll('.city-btn').forEach(btn =>
    btn.addEventListener('click', () => loadCity(+btn.dataset.i))
  );
}

async function loadCity(idx) {
  currentCity = idx;
  renderCityButtons();
  showLoading(true);

  try {
    const data = await fetchWeather(CITIES[idx]);
    updateUI(CITIES[idx], data);
    detectNight(data);
  } catch(e) {
    console.error('API error:', e);
    document.getElementById('heroCity').textContent = '获取失败';
  }

  showLoading(false);
}

function showLoading(v) {
  document.getElementById('loading').classList.toggle('show', v);
}

function updateUI(city, data) {
  const info = wmoToInfo(data.current.weather_code);

  // switch 3d scene
  switchScene(data.current.weather_code);

  // hero
  const tempEl = document.getElementById('heroTemp');
  const tempVal = Math.round(data.current.temperature_2m);
  gsap.fromTo(tempEl, { scale:0.85, opacity:0.4 }, { scale:1, opacity:1, duration:0.6, ease:'back.out(1.4)' });
  tempEl.textContent = tempVal;
  document.getElementById('heroCity').textContent = city.name;
  document.getElementById('heroDesc').textContent = info.label;

  // metrics
  const m = document.getElementById('metrics');
  const vis = data.current.visibility ? `${(data.current.visibility/1000).toFixed(1)}km` : '--';
  const aqi = '--';
  m.innerHTML = `
    <div class="metric"><span class="metric-val">💧 ${data.current.relative_humidity_2m}%</span><span class="metric-label">湿度</span></div>
    <div class="metric"><span class="metric-val">💨 ${dirToLabel(data.current.wind_direction_10m)} ${Math.round(data.current.wind_speed_10m)}km/h</span><span class="metric-label">风力</span></div>
    <div class="metric"><span class="metric-val">🌡️ ${Math.round(data.current.pressure_msl)}hPa</span><span class="metric-label">气压</span></div>
    <div class="metric"><span class="metric-val">👁️ ${vis}</span><span class="metric-label">能见度</span></div>
  `;

  // hourly
  const hourlyDiv = document.getElementById('hourlyScroll');
  const hSlice = data.hourly.time.slice(0, 24);
  hourlyDiv.innerHTML = hSlice.map((t,i) => {
    const code = data.hourly.weather_code[i];
    const hi = wmoToInfo(code);
    const tmp = Math.round(data.hourly.temperature_2m[i]);
    return `<div class="h-item"><span class="ht">${formatTime(t)}</span><span class="hi">${hi.icon}</span><span class="hv">${tmp}°</span></div>`;
  }).join('');

  // daily
  const dailyDiv = document.getElementById('dailyScroll');
  // skip today (index 0), show next 7
  const temps = [];
  for (let i = 1; i <= 7; i++) {
    temps.push({ lo: Math.round(data.daily.temperature_2m_min[i]), hi: Math.round(data.daily.temperature_2m_max[i]) });
  }
  const globalMin = Math.min(...temps.map(t=>t.lo));
  const globalMax = Math.max(...temps.map(t=>t.hi));
  const range = globalMax - globalMin || 1;

  dailyDiv.innerHTML = '';
  for (let i = 1; i <= 7; i++) {
    const code = data.daily.weather_code[i];
    const hi = wmoToInfo(code);
    const lo = Math.round(data.daily.temperature_2m_min[i]);
    const dhi = Math.round(data.daily.temperature_2m_max[i]);
    const leftPct = ((lo - globalMin) / range * 100).toFixed(0);
    const widthPct = ((dhi - lo) / range * 100).toFixed(0);
    const label = i === 1 ? '明天' : formatDay(data.daily.time[i]);

    const item = document.createElement('div');
    item.className = 'd-item';
    item.innerHTML = `
      <span class="dl">${label}</span>
      <span class="di">${hi.icon}</span>
      <div class="d-bar-wrap">
        <span class="dlo">${lo}°</span>
        <div class="d-bar-outer">
          <div class="d-bar-inner" style="left:${leftPct}%;width:${widthPct}%"></div>
        </div>
        <span class="dhi">${dhi}°</span>
      </div>
    `;
    dailyDiv.appendChild(item);
  }
}

function detectNight(data) {
  const h = new Date().getHours();
  isNight = (h < 6 || h > 18);
}

// ============================================================
// CLOCK
// ============================================================
function updateClock() {
  const now = new Date();
  const opts = { month:'short', day:'numeric', weekday:'short', hour:'2-digit', minute:'2-digit' };
  document.getElementById('clock').textContent = now.toLocaleDateString('zh-CN', opts);
}
setInterval(updateClock, 1000); updateClock();

// ============================================================
// ANIMATION LOOP
// ============================================================
function animate() {
  requestAnimationFrame(animate);
  const t = performance.now();
  updateRain();
  updateHRain();
  updateSnow();
  updateFloat(t);
  camera.position.x = Math.sin(t * 0.0002) * 0.5;
  camera.position.y = 2 + Math.cos(t * 0.00015) * 0.3;
  renderer.render(scene, camera);
}
animate();

// resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
// INIT
// ============================================================
loadCity(0);
</script>
</body>
</html>
