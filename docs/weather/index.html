<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天气 · Immersive Forecast</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Noto Sans SC', system-ui, -apple-system, sans-serif; overflow: hidden; background: #0a0e1a; color: #fff; }
  #bgCanvas { position: fixed; top: 0; left: 0; z-index: 0; }
  .ui-layer { position: relative; z-index: 10; width: 100%; height: 100vh; display: flex; flex-direction: column; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px 0; flex-shrink: 0; }
  .logo { font-size: 0.95rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; opacity: 0.4; }
  .clock { font-size: 0.75rem; opacity: 0.4; font-variant-numeric: tabular-nums; }
  .city-nav { display: flex; gap: 5px; padding: 12px 20px 0; overflow-x: auto; flex-shrink: 0; -webkit-overflow-scrolling: touch; }
  .city-nav::-webkit-scrollbar { height: 0; }
  .city-btn { padding: 6px 14px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7); font-size: 0.82rem;
    font-weight: 500; cursor: pointer; white-space: nowrap; transition: all 0.3s; font-family: inherit;
    min-height: 36px; display: flex; align-items: center; }
  .city-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
  .city-btn:active { transform: scale(0.95); }
  .city-btn.active { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.4);
    color: #fff; box-shadow: 0 0 16px rgba(255,255,255,0.06); }
  .main-content { flex: 0 0 auto; padding: 10px 20px 30px; }
  .hero { display: flex; align-items: flex-end; gap: 12px; margin-bottom: 6px; }
  .hero-temp { font-size: clamp(3.5rem, 14vw, 7rem); font-weight: 200; line-height: 0.9; }
  .hero-unit { font-size: clamp(1rem, 4vw, 2rem); vertical-align: super; opacity: 0.5; margin-left: -1px; }
  .hero-meta { display: flex; flex-direction: column; gap: 2px; padding-bottom: 10px; }
  .hero-city { font-size: clamp(1rem, 4.5vw, 2rem); font-weight: 700; }
  .hero-desc { font-size: clamp(0.75rem, 2.5vw, 1rem); opacity: 0.5; font-weight: 300; }
  .metrics { display: flex; gap: 18px; flex-wrap: wrap; padding: 14px 0 0; }
  .metric { display: flex; flex-direction: column; gap: 2px; min-width: 44px; }
  .metric-val { font-size: 1.1rem; font-weight: 700; }
  .metric-label { font-size: 0.65rem; opacity: 0.35; text-transform: uppercase; letter-spacing: 0.5px; }
  .divider { height: 1px; background: rgba(255,255,255,0.06); margin: 8px 0 14px; }
  .forecast-section { display: flex; flex-direction: column; gap: 14px; }
  .section-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.3; margin-bottom: 8px; }
  .hourly-scroll { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 4px; -webkit-overflow-scrolling: touch; }
  .hourly-scroll::-webkit-scrollbar { height: 0; }
  .h-item { display: flex; flex-direction: column; align-items: center; gap: 3px; min-width: 48px; padding: 4px 0; }
  .h-item .ht { font-size: 0.7rem; opacity: 0.4; }
  .h-item .hi { font-size: 1rem; }
  .h-item .hv { font-size: 0.88rem; font-weight: 600; }
  .daily-scroll { display: flex; flex-direction: column; gap: 0; }
  .d-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; }
  .d-item .dl { font-size: 0.82rem; min-width: 30px; opacity: 0.55; white-space: nowrap; }
  .d-item .di { font-size: 1rem; min-width: 24px; text-align: center; }
  .d-bar-wrap { flex: 1; display: flex; align-items: center; gap: 6px; }
  .d-bar-outer { flex: 1; height: 4px; background: rgba(255,255,255,0.06);
    border-radius: 2px; position: relative; overflow: hidden; }
  .d-bar-inner { position: absolute; top: 0; height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, #5b8cf7, #f7c948); }
  .d-item .dlo { font-size: 0.75rem; opacity: 0.35; min-width: 26px; text-align: right; }
  .d-item .dhi { font-size: 0.75rem; font-weight: 700; min-width: 26px; }
  .error-panel { position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    backdrop-filter: blur(10px); background: rgba(180,0,0,0.65); padding: 12px 20px;
    display: none; font-size: 0.85rem; text-align: center; }
  .error-panel.show { display: block; }
  @media (max-width: 600px) {
    .ui-layer { padding-bottom: 20px; }
    .hero-temp { font-size: 22vw; }
    .hero-unit { font-size: 8vw; }
    .hero-city { font-size: 6vw; }
    .hero-desc { font-size: 3.5vw; }
    .metric-val { font-size: 0.95rem; }
    .metric-label { font-size: 0.6rem; }
    .metrics { gap: 12px; }
    .h-item { min-width: 42px; }
  }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="error-panel" id="errorPanel"></div>

<div class="ui-layer">
  <div class="top-bar">
    <div class="logo">天气预报</div>
    <div class="clock" id="clock"></div>
  </div>
  <div class="city-nav" id="cityNav"></div>
  <div class="main-content">
    <div class="hero">
      <div class="hero-temp"><span id="heroTemp">--</span><span class="hero-unit">°C</span></div>
      <div class="hero-meta">
        <div class="hero-city" id="heroCity">加载中...</div>
        <div class="hero-desc" id="heroDesc"></div>
      </div>
    </div>
    <div class="metrics" id="metrics"></div>
    <div class="divider"></div>
    <div class="forecast-section">
      <div>
        <div class="section-label" style="margin-bottom:10px">逐时</div>
        <div class="hourly-scroll" id="hourlyScroll"></div>
      </div>
      <div>
        <div class="section-label" style="margin-bottom:6px">7 日</div>
        <div class="daily-scroll" id="dailyScroll"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const CITIES = [
  { name:'苏州', lat:31.30, lon:120.58 },
  { name:'北京', lat:39.90, lon:116.41 },
  { name:'上海', lat:31.23, lon:121.47 },
  { name:'广州', lat:23.13, lon:113.26 },
  { name:'深圳', lat:22.54, lon:114.06 },
  { name:'成都', lat:30.57, lon:104.07 },
  { name:'杭州', lat:30.25, lon:120.17 },
  { name:'南京', lat:32.06, lon:118.80 },
  { name:'武汉', lat:30.59, lon:114.31 },
  { name:'西安', lat:34.27, lon:108.94 },
];

const WMO = {
  0:{icon:'☀️',l:'晴',s:'clear'}, 1:{icon:'🌤️',l:'少云',s:'clear'}, 2:{icon:'⛅',l:'多云',s:'cloudy'},
  3:{icon:'☁️',l:'阴',s:'overcast'},
  45:{icon:'🌫️',l:'雾',s:'fog'}, 48:{icon:'🌫️',l:'雾凇',s:'fog'},
  51:{icon:'🌦️',l:'毛毛雨',s:'drizzle'}, 53:{icon:'🌦️',l:'小毛毛雨',s:'drizzle'}, 55:{icon:'🌦️',l:'大毛毛雨',s:'drizzle'},
  56:{icon:'🌨️',l:'冻毛毛雨',s:'sleet'}, 57:{icon:'🌨️',l:'强冻毛毛',s:'sleet'},
  61:{icon:'🌧️',l:'小雨',s:'rain'}, 63:{icon:'🌧️',l:'中雨',s:'rain'}, 65:{icon:'🌧️',l:'大雨',s:'heavyRain'},
  66:{icon:'🌨️',l:'冻小雨',s:'sleet'}, 67:{icon:'🌨️',l:'强冻雨',s:'sleet'},
  71:{icon:'🌨️',l:'小雪',s:'snow'}, 73:{icon:'🌨️',l:'中雪',s:'snow'}, 75:{icon:'❄️',l:'大雪',s:'heavySnow'},
  77:{icon:'🌨️',l:'雪粒',s:'snow'},
  80:{icon:'🌧️',l:'小阵雨',s:'rain'}, 81:{icon:'🌧️',l:'中阵雨',s:'rain'}, 82:{icon:'🌧️',l:'大阵雨',s:'heavyRain'},
  85:{icon:'🌨️',l:'小阵雪',s:'snow'}, 86:{icon:'❄️',l:'大阵雪',s:'heavySnow'},
  95:{icon:'⛈️',l:'雷暴',s:'storm'}, 96:{icon:'⛈️',l:'雷暴冰雹',s:'storm'}, 99:{icon:'⛈️',l:'强雷暴',s:'storm'},
};

function wmoInfo(c) { return WMO[c] || {icon:'🌡️',l:'未知',s:'clear'}; }

// ============================================================
// STATE
// ============================================================
let currentCity = 0;
let particles = [];
let canvasW = 0, canvasH = 0;
let weatherScene = 'idle';
let isNightTime = false;

// ============================================================
// CANVAS SETUP
// ============================================================
const cv = document.getElementById('bgCanvas');
const cx = cv.getContext('2d');

function resize() {
  canvasW = cv.width = window.innerWidth;
  canvasH = cv.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ============================================================
// PARTICLE TYPES
// ============================================================
let rainDrops = [], hRainDrops = [], snowFlakes = [];
let fluffyClouds = [], sunObj = {}, starArr = [];
let time = 0;
let lightningAlpha = 0;

// --- Rain ---
function makeRaindrops(count, speed, len) {
  const a = [];
  for (let i = 0; i < count; i++) a.push({
    x: Math.random() * canvasW, y: Math.random() * canvasH,
    sp: speed * (0.6 + Math.random() * 0.8),
    ln: len * (0.7 + Math.random() * 0.6),
    op: 0.15 + Math.random() * 0.35, w: 1 + Math.random() * 1.5,
  });
  return a;
}

// --- Snow ---
function makeSnowflakes(count) {
  const a = [];
  for (let i = 0; i < count; i++) a.push({
    x: Math.random() * canvasW, y: Math.random() * canvasH,
    r: 1.5 + Math.random() * 4, sp: 0.4 + Math.random() * 1.2,
    wd: (Math.random() - 0.5) * 1.5, ph: Math.random() * Math.PI * 2,
    op: 0.4 + Math.random() * 0.6,
  });
  return a;
}

// --- Fluffy cloud (multiple circles forming a billowy shape) ---
function makeCloud() {
  const cx = -300 + Math.random() * (canvasW + 600);
  const cy = 30 + Math.random() * (canvasH * 0.28);
  const circles = [];
  const baseW = 80 + Math.random() * 120;
  const count = 4 + Math.floor(Math.random() * 5);
  for (let i = 0; i < count; i++) {
    circles.push({
      ox: (Math.random() - 0.5) * baseW * 1.2,
      oy: (Math.random() - 0.5) * baseW * 0.3,
      r: baseW * 0.3 + Math.random() * baseW * 0.35,
    });
  }
  return { x: cx, y: cy, circles, sp: 0.15 + Math.random() * 0.35, opBase: 0.12 + Math.random() * 0.18 };
}

// --- Sun ---
function makeSun() {
  return {
    x: canvasW * 0.75 + (Math.random() - 0.5) * canvasW * 0.2,
    y: canvasH * 0.12 + Math.random() * canvasH * 0.08,
    r: 40 + Math.random() * 15,
    pulse: 0,
  };
}

// --- Stars ---
function makeStars(count) {
  const a = [];
  for (let i = 0; i < count; i++) a.push({
    x: Math.random() * canvasW, y: Math.random() * canvasH * 0.8,
    r: 0.5 + Math.random() * 2, ph: Math.random() * Math.PI * 2,
    sp: 0.01 + Math.random() * 0.03,
  });
  return a;
}

// Initialize
rainDrops = makeRaindrops(600, 12, 20);
hRainDrops = makeRaindrops(900, 18, 28);
snowFlakes = makeSnowflakes(400);
sunObj = makeSun();
starArr = makeStars(150);

function initSceneClouds() {
  fluffyClouds = [];
  for (let i = 0; i < 8; i++) fluffyClouds.push(makeCloud());
}
initSceneClouds();

function tickClouds() {
  for (const c of fluffyClouds) {
    c.x += c.sp;
    if (c.x - 200 > canvasW + 50) {
      c.x = -200;
      c.y = 30 + Math.random() * (canvasH * 0.28);
      const baseW = 80 + Math.random() * 120;
      const count = 4 + Math.floor(Math.random() * 5);
      c.circles = [];
      for (let i = 0; i < count; i++) {
        c.circles.push({
          ox: (Math.random()-0.5) * baseW * 1.2,
          oy: (Math.random()-0.5) * baseW * 0.3,
          r: baseW*0.3 + Math.random()*baseW*0.35,
        });
      }
    }
  }
}

// ============================================================
// DRAW FUNCTIONS
// ============================================================
const SKY = {
  idle:      [], // handled dynamically
  clear:     ['#0a2a4a','#1a4a7a','#3a7cb8','#6ab0d8'],
  cloudy:    ['#1a1f30','#2d3550','#4a5a70'],
  overcast:  ['#12141c','#1e222e','#2c3040'],
  fog:       ['#4a4f5a','#6a6f7a'],
  rain:      ['#0a1520','#101828','#1a2838'],
  heavyRain: ['#050a10','#0a0f18','#111820'],
  snow:      ['#5a6578','#8a95a5','#b0b8c5'],
  heavySnow: ['#4a5568','#7a8595','#a0a8b5'],
  sleet:     ['#3a4558','#5a6578'],
  storm:     ['#030508','#080a12','#0e1220'],
  drizzle:   ['#1a2535','#2a3545'],
};

function drawSky(type) {
  if (type === 'idle') {
    const colors = isNightTime
      ? ['#0a0e1a','#0d1530','#1c2850']
      : ['#e8ecf2','#d0d6e0','#b8c0cc'];
    const grad = cx.createLinearGradient(0, 0, 0, canvasH);
    colors.forEach((c, i) => grad.addColorStop(i / (colors.length - 1), c));
    cx.fillStyle = grad;
    cx.fillRect(0, 0, canvasW, canvasH);
    return;
  }
  const colors = SKY[type] || SKY.clear;
  const grad = cx.createLinearGradient(0, 0, 0, canvasH);
  colors.forEach((c, i) => grad.addColorStop(i / (colors.length - 1), c));
  cx.fillStyle = grad;
  cx.fillRect(0, 0, canvasW, canvasH);
}

// --- Sun with radial glow, corona and rays ---
function drawSun() {
  const s = sunObj;
  s.pulse += 0.02;
  const pr = s.r + Math.sin(s.pulse) * 3;

  // outer corona glow
  const glow3 = cx.createRadialGradient(s.x, s.y, 0, s.x, s.y, pr * 5);
  glow3.addColorStop(0, 'rgba(255,220,100,0.15)');
  glow3.addColorStop(0.5, 'rgba(255,200,50,0.04)');
  glow3.addColorStop(1, 'rgba(255,180,0,0)');
  cx.fillStyle = glow3;
  cx.fillRect(s.x - pr * 5, s.y - pr * 5, pr * 10, pr * 10);

  // middle glow
  const glow2 = cx.createRadialGradient(s.x, s.y, 0, s.x, s.y, pr * 2.5);
  glow2.addColorStop(0, 'rgba(255,240,180,0.4)');
  glow2.addColorStop(0.5, 'rgba(255,200,80,0.12)');
  glow2.addColorStop(1, 'rgba(255,180,50,0)');
  cx.fillStyle = glow2;
  cx.beginPath();
  cx.arc(s.x, s.y, pr * 2.5, 0, Math.PI * 2);
  cx.fill();

  // rays
  cx.save();
  cx.translate(s.x, s.y);
  cx.rotate(time * 0.0003);
  for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2;
    const rl = pr * 2.5 + Math.sin(time * 0.002 + i) * pr * 0.5;
    const rw = pr * 0.08;
    cx.save();
    cx.rotate(angle);
    cx.beginPath();
    cx.moveTo(0, -rw);
    cx.lineTo(rl, 0);
    cx.lineTo(0, rw);
    cx.closePath();
    cx.fillStyle = `rgba(255,240,160,${0.06 + Math.sin(time * 0.003 + i) * 0.03})`;
    cx.fill();
    cx.restore();
  }
  cx.restore();

  // sun disc
  const core = cx.createRadialGradient(s.x, s.y, 0, s.x, s.y, pr);
  core.addColorStop(0, '#fffbe8');
  core.addColorStop(0.4, '#ffe566');
  core.addColorStop(1, '#ffaa33');
  cx.fillStyle = core;
  cx.beginPath();
  cx.arc(s.x, s.y, pr, 0, Math.PI * 2);
  cx.fill();
}

// --- Fluffy cloud (overlapping circles) ---
function drawFluffyCloud(c, r, g, b) {
  for (const cir of c.circles) {
    const grad = cx.createRadialGradient(
      c.x + cir.ox, c.y + cir.oy, 0,
      c.x + cir.ox, c.y + cir.oy, cir.r
    );
    grad.addColorStop(0, `rgba(${r},${g},${b},${c.opBase * 0.9})`);
    grad.addColorStop(0.6, `rgba(${r},${g},${b},${c.opBase * 0.4})`);
    grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
    cx.fillStyle = grad;
    cx.beginPath();
    cx.arc(c.x + cir.ox, c.y + cir.oy, cir.r, 0, Math.PI * 2);
    cx.fill();
  }
}

// --- Stars ---
function drawStars() {
  starArr.forEach(s => {
    const o = 0.2 + 0.8 * Math.abs(Math.sin(time * s.sp + s.ph));
    cx.beginPath();
    cx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    cx.fillStyle = `rgba(255,255,240,${o})`;
    cx.fill();
  });
}

// --- Rain ---
function drawRain(drops) {
  for (const d of drops) {
    cx.beginPath();
    cx.strokeStyle = `rgba(180,200,230,${d.op})`;
    cx.lineWidth = d.w;
    cx.moveTo(d.x, d.y);
    cx.lineTo(d.x - 1.5, d.y - d.ln);
    cx.stroke();
  }
}

function tickRain(drops) {
  for (const d of drops) {
    d.y += d.sp; d.x -= 0.8;
    if (d.y > canvasH + 20) { d.y = -30; d.x = Math.random() * canvasW; }
  }
}

// --- Snow ---
function tickSnow() {
  time += 0.016;
  for (const f of snowFlakes) {
    f.x += f.wd + Math.sin(time * 2 + f.ph) * 0.5;
    f.y += f.sp;
    if (f.y > canvasH + 10) { f.y = -10; f.x = Math.random() * canvasW; }
  }
}

function drawSnow() {
  for (const f of snowFlakes) {
    cx.beginPath();
    cx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
    cx.fillStyle = `rgba(255,255,255,${f.op})`;
    cx.fill();
  }
}

// --- Lightning ---
function drawLightning() {
  if (lightningAlpha > 0.005) {
    cx.fillStyle = `rgba(240,240,255,${lightningAlpha})`;
    cx.fillRect(0, 0, canvasW, canvasH);
    lightningAlpha *= 0.82;
  }
}

// ============================================================
// MAIN LOOP
// ============================================================
const SCENES = {
  idle:      { clouds:0, stars:0, sun:0, rain:0, hRain:0, snow:0, storm:0, fog:0 },
  clear:     { clouds:0, stars:1, sun:1, rain:0, hRain:0, snow:0, storm:0, fog:0 },
  cloudy:    { clouds:1, stars:0, sun:1, rain:0, hRain:0, snow:0, storm:0, fog:0 },
  overcast:  { clouds:1, stars:0, sun:0, rain:0, hRain:0, snow:0, storm:0, fog:0 },
  fog:       { clouds:0, stars:0, sun:0, rain:0, hRain:0, snow:0, storm:0, fog:1 },
  rain:      { clouds:1, stars:0, sun:0, rain:1, hRain:0, snow:0, storm:0, fog:0 },
  heavyRain: { clouds:1, stars:0, sun:0, rain:0, hRain:1, snow:0, storm:0, fog:0 },
  storm:     { clouds:1, stars:0, sun:0, rain:0, hRain:1, snow:0, storm:1, fog:0 },
  snow:      { clouds:1, stars:0, sun:0, rain:0, hRain:0, snow:1, storm:0, fog:0 },
  heavySnow: { clouds:1, stars:0, sun:0, rain:0, hRain:0, snow:1, storm:0, fog:0 },
  sleet:     { clouds:1, stars:0, sun:0, rain:1, hRain:0, snow:1, storm:0, fog:0 },
  drizzle:   { clouds:1, stars:0, sun:0, rain:0.3, hRain:0, snow:0, storm:0, fog:0 },
};

function draw() {
  time += 16; // ms
  const sc = SCENES[weatherScene] || SCENES.clear;

  drawSky(weatherScene);

  // stars (clear)
  if (sc.stars) drawStars();

  // sun + corona
  if (sc.sun) drawSun();

  // clouds layer — always fluffy multi-circle clouds
  if (sc.clouds) {
    tickClouds();
    for (const c of fluffyClouds) {
      if (weatherScene === 'storm') {
        drawFluffyCloud(c, 35, 37, 50);
      } else if (weatherScene === 'overcast' || weatherScene === 'heavyRain' || weatherScene === 'rain' || weatherScene === 'drizzle') {
        drawFluffyCloud(c, 120, 130, 150);
      } else if (weatherScene === 'snow' || weatherScene === 'heavySnow' || weatherScene === 'sleet') {
        drawFluffyCloud(c, 180, 185, 200);
      } else {
        drawFluffyCloud(c, 240, 245, 255);
      }
    }
  }

  // fog shimmer
  if (sc.fog) {
    for (let i = 0; i < 5; i++) {
      const fogY = canvasH * 0.35 + i * canvasH * 0.15;
      const fogAlpha = 0.04 + Math.sin(time * 0.0003 + i) * 0.02;
      const fogGrad = cx.createRadialGradient(
        canvasW * 0.5 + Math.sin(time * 0.0002 + i) * canvasW * 0.3,
        fogY, 0, canvasW * 0.5, fogY, canvasW * 0.4
      );
      fogGrad.addColorStop(0, `rgba(170,175,180,${fogAlpha * 2})`);
      fogGrad.addColorStop(1, `rgba(170,175,180,0)`);
      cx.fillStyle = fogGrad;
      cx.fillRect(0, fogY - canvasH * 0.2, canvasW, canvasH * 0.4);
    }
  }

  // rain
  if (sc.rain && parseFloat(sc.rain) === 1) {
    tickRain(rainDrops); drawRain(rainDrops);
  } else if (sc.rain && parseFloat(sc.rain) < 1) {
    // drizzle - fewer drops
    tickRain(rainDrops);
    for (let i = 0; i < rainDrops.length * sc.rain; i++) {
      const d = rainDrops[i];
      cx.beginPath();
      cx.strokeStyle = 'rgba(180,200,230,0.1)';
      cx.lineWidth = 0.8;
      cx.moveTo(d.x, d.y);
      cx.lineTo(d.x - 0.8, d.y - d.ln * 0.6);
      cx.stroke();
    }
  }
  if (sc.hRain) {
    tickRain(hRainDrops); drawRain(hRainDrops);
  }

  // storm lightning
  if (sc.storm) {
    if (Math.random() < 0.003) {
      lightningAlpha = 0.7 + Math.random() * 0.3;
    }
    drawLightning();
  }

  // snow
  if (sc.snow) {
    tickSnow(); drawSnow();
  }

  // time counter
  requestAnimationFrame(draw);
}
draw();

// ============================================================
// API FETCH
// ============================================================
async function fetchWeather(city) {
  const url = 'https://api.open-meteo.com/v1/forecast'
    + '?latitude=' + city.lat
    + '&longitude=' + city.lon
    + '&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,wind_direction_10m,pressure_msl,visibility'
    + '&hourly=weather_code,temperature_2m'
    + '&daily=weather_code,temperature_2m_max,temperature_2m_min'
    + '&timezone=auto&forecast_days=8';

  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 15000);

  try {
    console.log('[weather] fetching:', url);
    const resp = await fetch(url, { signal: controller.signal });
    clearTimeout(timeout);
    console.log('[weather] status:', resp.status, resp.ok);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    console.log('[weather] data OK, temp:', data.current.temperature_2m);
    return data;
  } catch (e) {
    clearTimeout(timeout);
    throw e;
  }
}

// ============================================================
// UI RENDER
// ============================================================
const windDirs = ['北','东北','东','东南','南','西南','西','西北'];
function dirLabel(d) { return windDirs[(Math.round(d / 22.5) + 1) % 8] + '风'; }

function showError(msg) {
  const panel = document.getElementById('errorPanel');
  panel.textContent = '⚠️ ' + msg;
  panel.classList.add('show');
  setTimeout(() => panel.classList.remove('show'), 8000);
}

function showCity(city, data) {
  const info = wmoInfo(data.current.weather_code);
  const scene = info.s;
  weatherScene = scene;

  // animate temp
  const el = document.getElementById('heroTemp');
  const newVal = Math.round(data.current.temperature_2m);
  el.textContent = newVal;
  el.style.transform = 'scale(0.9)';
  el.style.opacity = '0.4';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      el.style.transition = 'transform 0.5s cubic-bezier(0.34,1.56,0.64,1), opacity 0.5s';
      el.style.transform = 'scale(1)';
      el.style.opacity = '1';
    });
  });

  document.getElementById('heroCity').textContent = city.name;
  document.getElementById('heroDesc').textContent = info.l;

  const vis = data.current.visibility ? (data.current.visibility / 1000).toFixed(1) + 'km' : '--';
  document.getElementById('metrics').innerHTML =
    `<div class="metric"><span class="metric-val">💧 ${data.current.relative_humidity_2m}%</span><span class="metric-label">湿度</span></div>` +
    `<div class="metric"><span class="metric-val">💨 ${dirLabel(data.current.wind_direction_10m)} ${Math.round(data.current.wind_speed_10m)}km/h</span><span class="metric-label">风力</span></div>` +
    `<div class="metric"><span class="metric-val">🌡️ ${Math.round(data.current.pressure_msl)}hPa</span><span class="metric-label">气压</span></div>` +
    `<div class="metric"><span class="metric-val">👁️ ${vis}</span><span class="metric-label">能见度</span></div>`;

  // hourly
  const hhtml = [];
  for (let i = 0; i < 24 && i < data.hourly.time.length; i++) {
    const h = wmoInfo(data.hourly.weather_code[i]);
    const t = data.hourly.time[i];
    hhtml.push(`<div class="h-item">
      <span class="ht">${t.slice(11, 13)}:00</span>
      <span class="hi">${h.icon}</span>
      <span class="hv">${Math.round(data.hourly.temperature_2m[i])}°</span>
    </div>`);
  }
  document.getElementById('hourlyScroll').innerHTML = hhtml.join('');

  // daily
  const temps = [];
  for (let i = 1; i <= 7 && i < data.daily.time.length; i++) {
    temps.push({ lo: Math.round(data.daily.temperature_2m_min[i]), hi: Math.round(data.daily.temperature_2m_max[i]) });
  }
  const gMin = Math.min(...temps.map(t => t.lo));
  const gMax = Math.max(...temps.map(t => t.hi));
  const gRange = gMax - gMin || 1;

  const dhtml = [];
  for (let i = 1; i <= 7 && i < data.daily.time.length; i++) {
    const hi = wmoInfo(data.daily.weather_code[i]);
    const lo = Math.round(data.daily.temperature_2m_min[i]);
    const dhi = Math.round(data.daily.temperature_2m_max[i]);
    const lP = ((lo - gMin) / gRange * 100).toFixed(0);
    const wP = ((dhi - lo) / gRange * 100).toFixed(0);
    const label = i === 1 ? '明天' : ['周日','周一','周二','周三','周四','周五','周六'][new Date(data.daily.time[i] + 'T00:00:00').getDay()];
    dhtml.push(`<div class="d-item">
      <span class="dl">${label}</span>
      <span class="di">${hi.icon}</span>
      <div class="d-bar-wrap">
        <span class="dlo">${lo}°</span>
        <div class="d-bar-outer">
          <div class="d-bar-inner" style="left:${lP}%;width:${Math.max(wP, 3)}%"></div>
        </div>
        <span class="dhi">${dhi}°</span>
      </div>
    </div>`);
  }
  document.getElementById('dailyScroll').innerHTML = dhtml.join('');

  // regen clouds
  initSceneClouds();
  // regen sun and stars too
  sunObj = makeSun();
  starArr = makeStars(150);
}

function renderCityNav() {
  document.getElementById('cityNav').innerHTML = CITIES.map((c, i) =>
    `<button class="city-btn ${i === currentCity ? 'active' : ''}" data-i="${i}">${c.name}</button>`
  ).join('');
  document.querySelectorAll('.city-btn').forEach(b =>
    b.addEventListener('click', () => loadCity(+b.dataset.i))
  );
}

async function loadCity(idx) {
  currentCity = idx;
  renderCityNav();
  document.getElementById('heroCity').textContent = '加载中...';

  try {
    const data = await fetchWeather(CITIES[idx]);
    showCity(CITIES[idx], data);
  } catch (e) {
    console.error('[weather] fetch error:', e);
    document.getElementById('heroCity').textContent = '数据获取失败';
    showError(e.name === 'AbortError'
      ? '天气 API 请求超时，检查网络后刷新重试'
      : '天气 API 错误: ' + e.message);
  }
}

// ============================================================
// CLOCK
// ============================================================
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleDateString('zh-CN', { month:'short', day:'numeric', weekday:'short', hour:'2-digit', minute:'2-digit' });
}
setInterval(updateClock, 1000); updateClock();

// ============================================================
console.log('[init] starting...');
isNightTime = (new Date().getHours() >= 19 || new Date().getHours() < 6);
renderCityNav();
loadCity(0);
</script>
