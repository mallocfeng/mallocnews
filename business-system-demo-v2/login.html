<body class="bg-surface text-on-surface overflow-hidden demo-login-page" data-page="login.html">
<div class="flex h-screen w-full demo-login-shell">
<!-- Left Section: Visual Narrative (Suppresses Nav Shell for Login) -->
<div class="hidden lg:flex lg:w-3/5 relative bg-login-hero overflow-hidden" data-alt="Modern luxury shopping mall interior with high ceilings, glass architecture, and soft natural sunlight illuminating polished marble floors and high-end boutiques.">
<!-- Branding Overlay -->
<div class="absolute top-12 left-12 z-10">
<div class="flex items-center gap-3">
<div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-white text-3xl">business_center</span>
</div>
<div>
<h1 class="text-2xl font-black tracking-tight text-white drop-shadow-md">智汇商业管理系统</h1>
<p class="text-sm text-white/80 font-medium tracking-widest">DIGITAL ASSET MANAGEMENT PLATFORM</p>
</div>
</div>
</div>
<!-- Content Area for Digital Curator feel -->
<div class="mt-auto p-20 w-full bg-gradient-to-t from-primary/80 to-transparent">
<div class="max-w-xl">
<h2 class="text-4xl font-headline font-bold text-white mb-6 leading-tight">
                        重塑商业空间价值<br/>打造数字地产新范式
                    </h2>
<div class="flex gap-8">
<div class="space-y-1">
<p class="text-xs text-white/60 font-label">实时经营概览</p>
<p class="text-2xl font-bold text-white tracking-tighter">98.5%</p>
</div>
<div class="w-px h-10 bg-white/20"></div>
<div class="space-y-1">
<p class="text-xs text-white/60 font-label">资产增值率</p>
<p class="text-2xl font-bold text-white tracking-tighter">+12.4%</p>
</div>
</div>
</div>
</div>
</div>
<!-- Right Section: Login Form -->
<div class="w-full lg:w-2/5 flex flex-col justify-center items-center px-8 sm:px-16 lg:px-24 bg-surface-container-lowest relative">
<!-- Mobile Branding -->
<div class="lg:hidden absolute top-8 left-8">
<h1 class="text-xl font-black text-primary">智汇商业</h1>
</div>
<div class="w-full max-w-sm">
<!-- Header -->
<div class="mb-12">
<h3 class="text-3xl font-bold text-primary font-headline tracking-tight mb-2">欢迎回来</h3>
<p class="text-on-surface-variant text-body-md">请登录您的账户以开始管理工作</p>
</div>
<!-- Form -->
<form class="space-y-6" id="demo-login-form">
<div class="mb-6 rounded-2xl border border-primary/10 bg-primary/5 px-4 py-3">
<p class="text-xs font-semibold tracking-wider uppercase text-primary mb-1">演示登录说明</p>
<p class="text-sm text-on-surface-variant leading-6">
            这是客户演示用的虚拟登录。
            用户名：<strong class="text-primary">a</strong>，
            密码：<strong class="text-primary">a</strong>。
          </p>
</div>

<!-- Username -->
<div class="space-y-2">
<label class="text-xs font-semibold text-outline tracking-wider uppercase px-1">用户名</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-xl group-focus-within:text-primary transition-colors">person</span>
</div>
<input autocomplete="username" class="block w-full pl-12 pr-4 py-4 bg-surface-container-highest border-none rounded-xl focus:ring-0 text-on-surface placeholder-outline-variant transition-all border-b-2 border-transparent focus:border-primary" id="demo-username" name="username" placeholder="请输入员工账号" type="text" value="a"/>
</div>
</div>
<!-- Password -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-xs font-semibold text-outline tracking-wider uppercase">密码</label>
<a class="text-xs text-primary hover:text-on-primary-container font-medium transition-colors" href="login.html">忘记密码？</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-xl group-focus-within:text-primary transition-colors">lock</span>
</div>
<input autocomplete="current-password" class="block w-full pl-12 pr-4 py-4 bg-surface-container-highest border-none rounded-xl focus:ring-0 text-on-surface placeholder-outline-variant transition-all border-b-2 border-transparent focus:border-primary" id="demo-password" name="password" placeholder="请输入您的登录密码" type="password" value="a"/>
</div>
</div>
<!-- Options -->
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary-container border-outline-variant rounded" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-on-surface-variant" for="remember-me">
                            保持登录状态
                        </label>
</div>
<!-- Action -->
<div class="pt-2">
<button class="w-full flex justify-center items-center py-4 px-6 rounded-xl text-white font-bold text-lg bg-gradient-to-br from-primary to-primary-container hover:from-primary-container hover:to-primary transition-all duration-300 shadow-xl shadow-primary/10 group" type="submit">
<span>登录系统</span>
<span class="material-symbols-outlined ml-2 text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>

<p class="hidden mt-4 rounded-xl bg-error-container px-4 py-3 text-sm font-medium text-on-error-container" id="demo-login-feedback"></p>
</form>
<!-- Footer Context -->
<div class="mt-20 border-t border-surface-container-high pt-8">
<div class="flex justify-between items-center text-xs text-outline font-medium">
<div class="flex items-center gap-4">
<a class="hover:text-primary transition-colors" href="index.html">帮助中心</a>
<a class="hover:text-primary transition-colors" href="index.html">安全声明</a>
</div>
<span>V 2.4.0</span>
</div>
</div>
</div>
</div>
</div>
<!-- Background Decorative Elements -->
<div class="fixed top-0 right-0 w-64 h-64 bg-primary/5 rounded-full blur-3xl -z-10 pointer-events-none"></div>
<div class="fixed bottom-0 left-0 w-96 h-96 bg-secondary-container/10 rounded-full blur-3xl -z-10 pointer-events-none"></div>

<script>
        (() => {
          const form = document.getElementById('demo-login-form');
          if (!form) return;
          const userInput = document.getElementById('demo-username');
          const passInput = document.getElementById('demo-password');
          const feedback = document.getElementById('demo-login-feedback');

          form.addEventListener('submit', (event) => {
            event.preventDefault();
            const username = (userInput?.value || '').trim();
            const password = (passInput?.value || '').trim();

            if (username === 'a' && password === 'a') {
              localStorage.setItem('demo_logged_in', 'true');
              localStorage.setItem('demo_user', username);
              window.location.href = 'dashboard.html';
              return;
            }

            if (feedback) {
              feedback.textContent = '演示账号错误，请输入用户名 a、密码 a。';
              feedback.classList.remove('hidden');
            }
          });
        })();
        </script>
</body></html>
