<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天气 · Immersive Forecast</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans SC', sans-serif; overflow: hidden; background: #0a0e1a; color: #fff; }
  #bgCanvas { position: fixed; top: 0; left: 0; z-index: 0; }
  .ui-layer { position: relative; z-index: 10; width: 100%; height: 100vh; display: flex; flex-direction: column; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px 0; flex-shrink: 0; }
  .logo { font-size: 1.1rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; opacity: 0.5; }
  .clock { font-size: 0.85rem; opacity: 0.5; font-variant-numeric: tabular-nums; }
  .city-nav { display: flex; gap: 6px; padding: 16px 24px 0; overflow-x: auto; flex-shrink: 0; }
  .city-btn { padding: 6px 18px; border-radius: 20px; border: 1.5px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.65); font-size: 0.88rem;
    font-weight: 500; cursor: pointer; white-space: nowrap; transition: all 0.4s; font-family: inherit; }
  .city-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
  .city-btn.active { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.4);
    color: #fff; box-shadow: 0 0 20px rgba(255,255,255,0.08); }
  .main-content { flex: 1; display: flex; flex-direction: column; padding: 12px 24px 20px; justify-content: center; }
  .hero { display: flex; align-items: flex-end; gap: 16px; margin-bottom: 8px; }
  .hero-temp { font-size: 7vw; font-weight: 200; line-height: 0.9; max-width: 340px; }
  .hero-unit { font-size: 2vw; vertical-align: super; opacity: 0.5; margin-left: -2px; }
  .hero-meta { display: flex; flex-direction: column; gap: 4px; padding-bottom: 14px; }
  .hero-city { font-size: 2vw; font-weight: 700; }
  .hero-desc { font-size: 1vw; opacity: 0.55; font-weight: 300; }
  .metrics { display: flex; gap: 24px; flex-wrap: wrap; padding: 20px 0; }
  .metric { display: flex; flex-direction: column; gap: 2px; }
  .metric-val { font-size: 1.3rem; font-weight: 700; }
  .metric-label { font-size: 0.72rem; opacity: 0.4; text-transform: uppercase; letter-spacing: 1px; }
  .divider { height: 1px; background: rgba(255,255,255,0.08); margin: 8px 0 16px; }
  .forecast-section { display: flex; flex-direction: column; gap: 16px; flex-shrink: 0; }
  .section-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.35; }
  .hourly-scroll { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 4px; }
  .hourly-scroll::-webkit-scrollbar { height: 2px; }
  .hourly-scroll::-webkit-scrollbar-track { background: transparent; }
  .hourly-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
  .h-item { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 52px; }
  .h-item .ht { font-size: 0.75rem; opacity: 0.45; }
  .h-item .hi { font-size: 1.1rem; }
  .h-item .hv { font-size: 0.95rem; font-weight: 600; }
  .daily-scroll { display: flex; gap: 12px; overflow-x: auto; }
  .daily-scroll::-webkit-scrollbar { height: 2px; }
  .daily-scroll::-webkit-scrollbar-track { background: transparent; }
  .daily-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }
  .d-item { display: flex; align-items: center; gap: 12px; min-width: 200px; padding: 10px 0; }
  .d-item .dl { font-size: 0.85rem; min-width: 36px; opacity: 0.6; }
  .d-item .di { font-size: 1.1rem; min-width: 28px; text-align: center; }
  .d-bar-wrap { flex: 1; display: flex; align-items: center; gap: 8px; }
  .d-bar-outer { flex: 1; height: 3px; background: rgba(255,255,255,0.08);
    border-radius: 2px; position: relative; overflow: hidden; }
  .d-bar-inner { position: absolute; top: 0; height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, #5b8cf7, #f7c948); }
  .d-item .dlo { font-size: 0.8rem; opacity: 0.4; min-width: 28px; text-align: right; }
  .d-item .dhi { font-size: 0.8rem; font-weight: 700; min-width: 28px; }

  .error-panel { position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    backdrop-filter: blur(10px); background: rgba(180,0,0,0.6); padding: 12px 48px;
    display: none; font-size: 0.92rem; }
  .error-panel.show { display: block; }

  @media (max-width: 600px) {
    .hero-temp { font-size: 18vw; } .hero-unit { font-size: 8vw; }
    .hero-city { font-size: 6vw; } .hero-desc { font-size: 3.5vw; }
    .metric-val { font-size: 1rem; }
    .top-bar { padding: 12px 16px 0; } .city-nav { padding: 12px 16px 0; }
    .main-content { padding: 8px 16px 12px; }
  }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="error-panel" id="errorPanel"></div>

<div class="ui-layer">
  <div class="top-bar">
    <div class="logo">天气预报</div>
    <div class="clock" id="clock"></div>
  </div>
  <div class="city-nav" id="cityNav"></div>
  <div class="main-content">
    <div class="hero">
      <div class="hero-temp"><span id="heroTemp">--</span><span class="hero-unit">°C</span></div>
      <div class="hero-meta">
        <div class="hero-city" id="heroCity">加载中...</div>
        <div class="hero-desc" id="heroDesc"></div>
      </div>
    </div>
    <div class="metrics" id="metrics"></div>
    <div class="divider"></div>
    <div class="forecast-section">
      <div>
        <div class="section-label" style="margin-bottom:10px">逐时</div>
        <div class="hourly-scroll" id="hourlyScroll"></div>
      </div>
      <div>
        <div class="section-label" style="margin-bottom:6px">7 日</div>
        <div class="daily-scroll" id="dailyScroll"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const CITIES = [
  { name:'苏州', lat:31.30, lon:120.58 },
  { name:'北京', lat:39.90, lon:116.41 },
  { name:'上海', lat:31.23, lon:121.47 },
  { name:'广州', lat:23.13, lon:113.26 },
  { name:'深圳', lat:22.54, lon:114.06 },
  { name:'成都', lat:30.57, lon:104.07 },
  { name:'杭州', lat:30.25, lon:120.17 },
  { name:'南京', lat:32.06, lon:118.80 },
  { name:'武汉', lat:30.59, lon:114.31 },
  { name:'西安', lat:34.27, lon:108.94 },
];

const WMO = {
  0:{icon:'☀️',l:'晴',s:'clear'}, 1:{icon:'🌤️',l:'少云',s:'clear'}, 2:{icon:'⛅',l:'多云',s:'cloudy'},
  3:{icon:'☁️',l:'阴',s:'overcast'},
  45:{icon:'🌫️',l:'雾',s:'fog'}, 48:{icon:'🌫️',l:'雾凇',s:'fog'},
  51:{icon:'🌦️',l:'毛毛雨',s:'drizzle'}, 53:{icon:'🌦️',l:'小毛毛雨',s:'drizzle'}, 55:{icon:'🌦️',l:'大毛毛雨',s:'drizzle'},
  56:{icon:'🌨️',l:'冻毛毛雨',s:'sleet'}, 57:{icon:'🌨️',l:'强冻毛毛',s:'sleet'},
  61:{icon:'🌧️',l:'小雨',s:'rain'}, 63:{icon:'🌧️',l:'中雨',s:'rain'}, 65:{icon:'🌧️',l:'大雨',s:'heavyRain'},
  66:{icon:'🌨️',l:'冻小雨',s:'sleet'}, 67:{icon:'🌨️',l:'强冻雨',s:'sleet'},
  71:{icon:'🌨️',l:'小雪',s:'snow'}, 73:{icon:'🌨️',l:'中雪',s:'snow'}, 75:{icon:'❄️',l:'大雪',s:'heavySnow'},
  77:{icon:'🌨️',l:'雪粒',s:'snow'},
  80:{icon:'🌧️',l:'小阵雨',s:'rain'}, 81:{icon:'🌧️',l:'中阵雨',s:'rain'}, 82:{icon:'🌧️',l:'大阵雨',s:'heavyRain'},
  85:{icon:'🌨️',l:'小阵雪',s:'snow'}, 86:{icon:'❄️',l:'大阵雪',s:'heavySnow'},
  95:{icon:'⛈️',l:'雷暴',s:'storm'}, 96:{icon:'⛈️',l:'雷暴冰雹',s:'storm'}, 99:{icon:'⛈️',l:'强雷暴',s:'storm'},
};

function wmoInfo(c) { return WMO[c] || {icon:'🌡️',l:'未知',s:'clear'}; }

// ============================================================
// STATE
// ============================================================
let currentCity = 0;
let particles = [];
let canvasW = 0, canvasH = 0;
let weatherScene = 'clear';

// ============================================================
// CANVAS SETUP
// ============================================================
const cv = document.getElementById('bgCanvas');
const cx = cv.getContext('2d');

function resize() {
  canvasW = cv.width = window.innerWidth;
  canvasH = cv.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ============================================================
// ANIMATION SCENES
// ============================================================
function createRaindrops(count, speed, len) {
  const arr = [];
  for (let i = 0; i < count; i++) {
    arr.push({
      x: Math.random() * canvasW,
      y: Math.random() * canvasH,
      sp: speed * (0.6 + Math.random() * 0.8),
      ln: len * (0.7 + Math.random() * 0.6),
      op: 0.15 + Math.random() * 0.35,
      w: 1 + Math.random() * 1.5,
    });
  }
  return arr;
}

function createSnowflakes(count) {
  const arr = [];
  for (let i = 0; i < count; i++) {
    arr.push({
      x: Math.random() * canvasW,
      y: Math.random() * canvasH,
      r: 1.5 + Math.random() * 4,
      sp: 0.4 + Math.random() * 1.2,
      wd: (Math.random() - 0.5) * 1.5,
      ph: Math.random() * Math.PI * 2,
      op: 0.4 + Math.random() * 0.6,
    });
  }
  return arr;
}

function createCloudShapes() {
  const arr = [];
  for (let i = 0; i < 12; i++) {
    arr.push({
      x: -200 + Math.random() * (canvasW + 400),
      y: 20 + Math.random() * (canvasH * 0.35),
      w: 250 + Math.random() * 400,
      h: 60 + Math.random() * 120,
      sp: 0.15 + Math.random() * 0.4,
      op: 0.03 + Math.random() * 0.08,
    });
  }
  return arr;
}

function createStars(count) {
  const arr = [];
  for (let i = 0; i < count; i++) {
    arr.push({
      x: Math.random() * canvasW,
      y: Math.random() * canvasH * 0.75,
      r: 0.5 + Math.random() * 2,
      ph: Math.random() * Math.PI * 2,
      sp: 0.01 + Math.random() * 0.03,
    });
  }
  return arr;
}

// Pre-generate
let rainDrops = createRaindrops(600, 12, 20);
let hRainDrops = createRaindrops(900, 18, 28);
let snowFlakes = createSnowflakes(400);
let clouds = createCloudShapes();
let stars = createStars(120);
let time = 0;
let lightningTimer = 0;
let lightningAlpha = 0;

// ============================================================
// DRAW SCENE
// ============================================================
const SKY = {
  clear:     ['#0a2a4a','#1a4a7a','#3a7cb8','#6ab0d8'],
  cloudy:    ['#1a1a2e','#2d3545','#4a5a6a'],
  overcast:  ['#151520','#252a35','#353a45'],
  fog:       ['#4a4f5a','#6a6f7a'],
  rain:      ['#0a1520','#152030','#1a2838'],
  heavyRain: ['#050a10','#0a0f18','#111820'],
  snow:      ['#5a6578','#8a95a5','#b0b8c5'],
  heavySnow: ['#4a5568','#7a8595','#a0a8b5'],
  sleet:     ['#3a4558','#5a6578'],
  storm:     ['#030508','#080a12','#0e1220'],
};

function drawSky(type) {
  const colors = SKY[type] || SKY.clear;
  const grad = cx.createLinearGradient(0, 0, 0, canvasH);
  colors.forEach((c, i) => grad.addColorStop(i / (colors.length - 1), c));
  cx.fillStyle = grad;
  cx.fillRect(0, 0, canvasW, canvasH);
}

function drawStars() {
  stars.forEach(s => {
    const o = 0.2 + 0.8 * Math.abs(Math.sin(time * s.sp + s.ph));
    cx.beginPath();
    cx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    cx.fillStyle = `rgba(255,255,240,${o})`;
    cx.fill();
  });
}

function drawRain(drops) {
  drops.forEach(d => {
    cx.beginPath();
    cx.strokeStyle = `rgba(180,200,230,${d.op})`;
    cx.lineWidth = d.w;
    cx.moveTo(d.x, d.y);
    cx.lineTo(d.x - 1.5, d.y - d.ln);
    cx.stroke();
  });
}

function tickRain(drops) {
  drops.forEach(d => {
    d.y += d.sp; d.x -= 0.8;
    if (d.y > canvasH + 20) { d.y = -30; d.x = Math.random() * canvasW; }
  });
}

function drawSnow() {
  snowFlakes.forEach(f => {
    cx.beginPath();
    cx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
    cx.fillStyle = `rgba(255,255,255,${f.op})`;
    cx.fill();
  });
}

function tickSnow() {
  time += 0.016;
  snowFlakes.forEach(f => {
    f.x += f.wd + Math.sin(time * 2 + f.ph) * 0.5;
    f.y += f.sp;
    if (f.y > canvasH + 10) { f.y = -10; f.x = Math.random() * canvasW; }
  });
}

function drawClouds() {
  clouds.forEach(c => {
    cx.beginPath();
    cx.ellipse(c.x, c.y, c.w / 2, c.h / 2, 0, 0, Math.PI * 2);
    cx.fillStyle = `rgba(200,210,220,${c.op})`;
    cx.fill();
  });
}

function tickClouds() {
  clouds.forEach(c => {
    c.x += c.sp;
    if (c.x - c.w / 2 > canvasW + 100) c.x = -c.w - 100;
  });
}

function drawLightning() {
  if (lightningAlpha > 0.01) {
    cx.fillStyle = `rgba(255,255,255,${lightningAlpha})`;
    cx.fillRect(0, 0, canvasW, canvasH);
    lightningAlpha *= 0.85;
  }
}

// ============================================================
// MAIN LOOP
// ============================================================
function draw() {
  drawSky(weatherScene);

  if (weatherScene === 'clear') drawStars();
  if (weatherScene === 'cloudy' || weatherScene === 'overcast' || weatherScene === 'fog') { drawClouds(); tickClouds(); }
  if (weatherScene === 'rain') { drawRain(rainDrops); tickRain(rainDrops); }
  if (weatherScene === 'heavyRain' || weatherScene === 'storm') {
    drawRain(hRainDrops); tickRain(hRainDrops);
    if (weatherScene === 'storm') drawLightning();
  }
  if (weatherScene === 'snow' || weatherScene === 'heavySnow') { drawSnow(); tickSnow(); }
  if (weatherScene === 'sleet') {
    drawRain(rainDrops); tickRain(rainDrops);
    drawSnow(); tickSnow();
  }

  requestAnimationFrame(draw);
}
draw();

// ============================================================
// API FETCH
// ============================================================
async function fetchWeather(city) {
  const url = 'https://api.open-meteo.com/v1/forecast'
    + '?latitude=' + city.lat
    + '&longitude=' + city.lon
    + '&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,wind_direction_10m,pressure_msl,visibility'
    + '&hourly=weather_code,temperature_2m'
    + '&daily=weather_code,temperature_2m_max,temperature_2m_min'
    + '&timezone=auto&forecast_days=8';

  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 15000);

  try {
    console.log('[weather] fetching:', url);
    const resp = await fetch(url, { signal: controller.signal });
    clearTimeout(timeout);
    console.log('[weather] status:', resp.status, resp.ok);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    console.log('[weather] data OK, temp:', data.current.temperature_2m);
    return data;
  } catch (e) {
    clearTimeout(timeout);
    throw e;
  }
}

// ============================================================
// UI RENDER
// ============================================================
const windDirs = ['北','东北','东','东南','南','西南','西','西北'];
function dirLabel(d) { return windDirs[(Math.round(d / 22.5) + 1) % 8] + '风'; }

function showError(msg) {
  const panel = document.getElementById('errorPanel');
  panel.textContent = '⚠️ ' + msg;
  panel.classList.add('show');
  setTimeout(() => panel.classList.remove('show'), 8000);
}

function showCity(city, data) {
  const info = wmoInfo(data.current.weather_code);
  const scene = info.s;
  weatherScene = scene;

  // animate temp
  const el = document.getElementById('heroTemp');
  const newVal = Math.round(data.current.temperature_2m);
  el.textContent = newVal;
  el.style.transform = 'scale(0.9)';
  el.style.opacity = '0.4';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      el.style.transition = 'transform 0.5s cubic-bezier(0.34,1.56,0.64,1), opacity 0.5s';
      el.style.transform = 'scale(1)';
      el.style.opacity = '1';
    });
  });

  document.getElementById('heroCity').textContent = city.name;
  document.getElementById('heroDesc').textContent = info.l;

  const vis = data.current.visibility ? (data.current.visibility / 1000).toFixed(1) + 'km' : '--';
  document.getElementById('metrics').innerHTML =
    `<div class="metric"><span class="metric-val">💧 ${data.current.relative_humidity_2m}%</span><span class="metric-label">湿度</span></div>` +
    `<div class="metric"><span class="metric-val">💨 ${dirLabel(data.current.wind_direction_10m)} ${Math.round(data.current.wind_speed_10m)}km/h</span><span class="metric-label">风力</span></div>` +
    `<div class="metric"><span class="metric-val">🌡️ ${Math.round(data.current.pressure_msl)}hPa</span><span class="metric-label">气压</span></div>` +
    `<div class="metric"><span class="metric-val">👁️ ${vis}</span><span class="metric-label">能见度</span></div>`;

  // hourly
  const hhtml = [];
  for (let i = 0; i < 24 && i < data.hourly.time.length; i++) {
    const h = wmoInfo(data.hourly.weather_code[i]);
    const t = data.hourly.time[i];
    hhtml.push(`<div class="h-item">
      <span class="ht">${t.slice(11, 13)}:00</span>
      <span class="hi">${h.icon}</span>
      <span class="hv">${Math.round(data.hourly.temperature_2m[i])}°</span>
    </div>`);
  }
  document.getElementById('hourlyScroll').innerHTML = hhtml.join('');

  // daily
  const temps = [];
  for (let i = 1; i <= 7 && i < data.daily.time.length; i++) {
    temps.push({ lo: Math.round(data.daily.temperature_2m_min[i]), hi: Math.round(data.daily.temperature_2m_max[i]) });
  }
  const gMin = Math.min(...temps.map(t => t.lo));
  const gMax = Math.max(...temps.map(t => t.hi));
  const gRange = gMax - gMin || 1;

  const dhtml = [];
  for (let i = 1; i <= 7 && i < data.daily.time.length; i++) {
    const hi = wmoInfo(data.daily.weather_code[i]);
    const lo = Math.round(data.daily.temperature_2m_min[i]);
    const dhi = Math.round(data.daily.temperature_2m_max[i]);
    const lP = ((lo - gMin) / gRange * 100).toFixed(0);
    const wP = ((dhi - lo) / gRange * 100).toFixed(0);
    const label = i === 1 ? '明天' : ['周日','周一','周二','周三','周四','周五','周六'][new Date(data.daily.time[i] + 'T00:00:00').getDay()];
    dhtml.push(`<div class="d-item">
      <span class="dl">${label}</span>
      <span class="di">${hi.icon}</span>
      <div class="d-bar-wrap">
        <span class="dlo">${lo}°</span>
        <div class="d-bar-outer">
          <div class="d-bar-inner" style="left:${lP}%;width:${Math.max(wP, 3)}%"></div>
        </div>
        <span class="dhi">${dhi}°</span>
      </div>
    </div>`);
  }
  document.getElementById('dailyScroll').innerHTML = dhtml.join('');

  // cloud regen
  clouds = createCloudShapes();
}

function renderCityNav() {
  document.getElementById('cityNav').innerHTML = CITIES.map((c, i) =>
    `<button class="city-btn ${i === currentCity ? 'active' : ''}" data-i="${i}">${c.name}</button>`
  ).join('');
  document.querySelectorAll('.city-btn').forEach(b =>
    b.addEventListener('click', () => loadCity(+b.dataset.i))
  );
}

async function loadCity(idx) {
  currentCity = idx;
  renderCityNav();
  document.getElementById('heroCity').textContent = '加载中...';

  try {
    const data = await fetchWeather(CITIES[idx]);
    showCity(CITIES[idx], data);
  } catch (e) {
    console.error('[weather] fetch error:', e);
    document.getElementById('heroCity').textContent = '数据获取失败';
    showError(e.name === 'AbortError'
      ? '天气 API 请求超时，检查网络后刷新重试'
      : '天气 API 错误: ' + e.message);
  }
}

// ============================================================
// CLOCK
// ============================================================
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleDateString('zh-CN', { month:'short', day:'numeric', weekday:'short', hour:'2-digit', minute:'2-digit' });
}
setInterval(updateClock, 1000); updateClock();

// ============================================================
// INIT
// ============================================================
console.log('[init] starting...');
renderCityNav();
loadCity(0);
</script>
</body>
</html>
