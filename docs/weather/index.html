<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天气 · 动效预报</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 1.2s ease;
    color: #fff;
  }

  /* ---- sky backgrounds ---- */
  .sky-sunny  { background: linear-gradient(180deg, #1a6fc4 0%, #59b4e8 50%, #f0c230 100%); }
  .sky-cloudy { background: linear-gradient(180deg, #3a4f7a 0%, #5d6e85 40%, #8a94a3 100%); }
  .sky-rainy  { background: linear-gradient(180deg, #0c1b2e 0%, #1a2f47 50%, #263d52 100%); }
  .sky-snowy  { background: linear-gradient(180deg, #8e9eab 0%, #a8b5c5 50%, #d5dde8 100%); color: #1a2a3a; }
  .sky-stormy { background: linear-gradient(180deg, #070b14 0%, #121b2e 50%, #1e1535 100%); }
  .sky-night  { background: linear-gradient(180deg, #04081a 0%, #0d1530 50%, #1c2850 100%); }

  /* ---- canvas overlay ---- */
  #weatherCanvas {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 1;
  }

  /* ---- dim overlay so cards pop ---- */
  .dim-overlay {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.25);
    pointer-events: none; z-index: 1;
  }

  /* ---- main layout ---- */
  .app {
    position: relative; z-index: 2;
    max-width: 1100px; margin: 0 auto;
    padding: 24px 16px 60px;
  }

  /* ---- header ---- */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
    margin-bottom: 28px;
  }
  .header h1 {
    font-size: 1.5rem; font-weight: 700;
    text-shadow: 0 2px 10px rgba(0,0,0,0.4);
  }
  .header .time-badge {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(8px);
    border-radius: 16px;
    padding: 6px 16px;
    font-size: 0.82rem;
    color: rgba(255,255,255,0.85);
  }

  /* ---- city picker ---- */
  .city-bar {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 24px;
  }
  .city-chip {
    padding: 7px 18px;
    border-radius: 20px;
    font-size: 0.92rem; font-weight: 500;
    cursor: pointer; user-select: none;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.8);
    transition: all 0.3s;
  }
  .city-chip:hover { background: rgba(255,255,255,0.22); color: #fff; }
  .city-chip.active {
    background: rgba(255,255,255,0.3);
    color: #fff;
    border-color: rgba(255,255,255,0.5);
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }

  /* ---- solid dark card ---- */
  .card {
    background: rgba(20,24,36,0.65);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 18px;
    padding: 28px 28px 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  }

  /* ---- current weather ---- */
  .current-weather {
    display: flex; align-items: center; gap: 24px;
    margin-bottom: 24px; flex-wrap: wrap;
  }
  .current-icon {
    font-size: 4.5rem; line-height: 1;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
    animation: floatBounce 3s ease-in-out infinite;
  }
  @keyframes floatBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .current-info h2 { font-size: 3.6rem; font-weight: 300; line-height: 1.1; }
  .current-info h2 span { font-size: 1.5rem; vertical-align: top; margin-left: 2px; }
  .current-info .desc { font-size: 1.05rem; color: rgba(255,255,255,0.7); margin-top: 4px; }
  .current-info .city-name {
    font-size: 1.6rem; font-weight: 700; margin-bottom: 4px;
  }

  /* ---- details grid ---- */
  .details-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(135px, 1fr));
    gap: 12px;
  }
  .detail-card {
    background: rgba(255,255,255,0.06);
    border-radius: 12px; padding: 14px 10px;
    text-align: center;
    transition: transform 0.3s, background 0.3s;
  }
  .detail-card:hover {
    transform: translateY(-3px);
    background: rgba(255,255,255,0.1);
  }
  .detail-card .icon { font-size: 1.4rem; }
  .detail-card .val { font-size: 1.2rem; font-weight: 700; margin: 5px 0 2px; }
  .detail-card .label { font-size: 0.75rem; color: rgba(255,255,255,0.55); }

  /* ---- section ---- */
  .section { margin-top: 24px; }
  .section-title {
    font-size: 1rem; font-weight: 500;
    margin-bottom: 14px; color: rgba(255,255,255,0.6);
  }

  /* ---- forecast ---- */
  .forecast-row, .hourly-row {
    display: flex; gap: 10px;
    overflow-x: auto; padding-bottom: 6px;
    -webkit-overflow-scrolling: touch;
  }
  .hourly-row { margin-bottom: 0; }

  /* forecast card */
  .forecast-card {
    flex: 0 0 105px;
    background: rgba(255,255,255,0.06);
    border-radius: 14px; padding: 16px 10px;
    text-align: center;
    transition: transform 0.3s, background 0.3s;
  }
  .forecast-card:hover { transform: translateY(-3px); background: rgba(255,255,255,0.12); }
  .forecast-card .day { font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 8px; line-height: 1.3; }
  .forecast-card .day small { font-size: 0.72rem; color: rgba(255,255,255,0.4); }
  .forecast-card .ficon { font-size: 1.8rem; margin: 8px 0; }
  .forecast-card .ftemp { font-size: 1rem; font-weight: 700; }
  .forecast-card .lo { font-weight: 400; color: rgba(255,255,255,0.5); font-size: 0.85rem; }

  /* hourly card */
  .hourly-card {
    flex: 0 0 70px;
    background: rgba(255,255,255,0.05);
    border-radius: 10px; padding: 10px 6px;
    text-align: center;
  }
  .hourly-card .htime { font-size: 0.78rem; color: rgba(255,255,255,0.5); margin-bottom: 6px; }
  .hourly-card .hicon { font-size: 1.3rem; margin-bottom: 4px; }
  .hourly-card .htemp { font-size: 0.92rem; font-weight: 700; }

  /* ---- cloud layers ---- */
  .cloud-layer {
    position: fixed; top: 0; left: 0;
    width: 200%; height: 100%;
    pointer-events: none; z-index: 0;
    opacity: 0; transition: opacity 1.5s;
  }
  .cloud-layer.visible { opacity: 1; }
  .cloud {
    position: absolute;
    background: rgba(200,210,220,0.12);
    border-radius: 50%;
    filter: blur(40px);
  }
  .cloud-1 { width: 500px; height: 180px; top: 8%;  animation: drift 60s linear infinite; }
  .cloud-2 { width: 400px; height: 140px; top: 18%; animation: drift 80s linear infinite; animation-delay: -20s; }
  .cloud-3 { width: 600px; height: 200px; top: 28%; animation: drift 70s linear infinite; animation-delay: -40s; }
  .cloud-4 { width: 350px; height: 120px; top: 5%;  animation: drift 90s linear infinite; animation-delay: -10s; }
  .cloud-5 { width: 450px; height: 160px; top: 20%; animation: drift 75s linear infinite; animation-delay: -50s; }
  @keyframes drift { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

  /* lightning */
  .lightning-flash {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(255,255,255,0.85);
    pointer-events: none; z-index: 3;
    opacity: 0;
  }

  /* responsive */
  @media (max-width: 600px) {
    .current-icon { font-size: 3.2rem; }
    .current-info h2 { font-size: 2.8rem; }
    .current-info .city-name { font-size: 1.3rem; }
    .card { padding: 18px 16px 16px; }
    .forecast-card { flex: 0 0 92px; }
  }
</style>
</head>
<body>

<div class="dim-overlay"></div>

<!-- cloud layer -->
<div class="cloud-layer" id="cloudLayer">
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>
  <div class="cloud cloud-4"></div>
  <div class="cloud cloud-5"></div>
</div>

<canvas id="weatherCanvas"></canvas>

<div class="lightning-flash" id="lightning"></div>

<div class="app">
  <div class="header">
    <h1>⛅ 天气动效预报</h1>
    <div class="time-badge" id="timeBadge"></div>
  </div>

  <div class="city-bar" id="cityBar"></div>

  <div class="card">
    <div class="current-weather">
      <div class="current-icon" id="curIcon">🌤️</div>
      <div class="current-info">
        <div class="city-name" id="curCity">苏州</div>
        <h2 id="curTemp">22<span>°C</span></h2>
        <div class="desc" id="curDesc">多云转晴</div>
      </div>
    </div>
    <div class="details-grid" id="detailsGrid"></div>
  </div>

  <div class="section">
    <div class="section-title">逐时预报</div>
    <div class="hourly-row" id="hourlyRow"></div>
  </div>

  <div class="section">
    <div class="section-title">7 日预报</div>
    <div class="forecast-row" id="forecastRow"></div>
  </div>
</div>

<script>
const CITIES = [
  { name: '苏州' }, { name: '北京' }, { name: '上海' },
  { name: '广州' }, { name: '深圳' }, { name: '成都' },
  { name: '杭州' }, { name: '南京' }, { name: '武汉' }, { name: '西安' },
];

const W = {
  sunny:     { icon:'☀️',  sky:'sky-sunny',  cloud:false, canvas:'sunny' },
  cloudy:    { icon:'⛅',  sky:'sky-cloudy', cloud:true,  canvas:'cloudy' },
  rainy:     { icon:'🌧️', sky:'sky-rainy',  cloud:true,  canvas:'rain' },
  heavyRain: { icon:'🌧️', sky:'sky-rainy',  cloud:true,  canvas:'heavyRain' },
  storm:     { icon:'⛈️',  sky:'sky-stormy', cloud:true,  canvas:'storm' },
  snowy:     { icon:'🌨️', sky:'sky-snowy',  cloud:true,  canvas:'snow' },
  night:     { icon:'🌙',  sky:'sky-night',  cloud:false, canvas:'stars' },
};

function seededRandom(seed) {
  let s = seed;
  return function() { s=(s*16807)%2147483647; return (s-1)/2147483646; };
}

function genWeather(idx) {
  const rng = seededRandom(idx * 137 + 42);
  const now = new Date();
  const hour = now.getHours();
  const baseTemps = [18, 12, 17, 26, 27, 16, 19, 18, 20, 14];
  const baseTemp = baseTemps[idx] || 18;
  const types = ['sunny','sunny','cloudy','cloudy','rainy','rainy','storm','snowy'];
  const type = idx === 0 ? 'rainy' : types[Math.floor(rng() * types.length)];
  const wt = W[type];
  const temp = Math.round(baseTemp + (rng()-0.5)*6 + (hour>6 && hour<18 ? 3 : -2));
  const hi = temp + Math.round(rng()*4+2);
  const lo = temp - Math.round(rng()*4+2);
  const humidity = Math.round(45 + rng()*40);
  const wind = Math.round(5 + rng()*25);
  const windDirs = ['北风','南风','东风','西风','东北风','东南风','西南风','西北风'];
  const windDir = windDirs[Math.floor(rng()*windDirs.length)];
  const aqi = Math.round(30 + rng()*120);
  const uv = Math.round(rng()*10);
  const pressure = Math.round(1005 + rng()*25);
  const visibility = Math.round(5 + rng()*15);
  const descs = { sunny:'晴空万里',cloudy:'多云转阴',rainy:'小雨绵绵',heavyRain:'大雨倾盆',storm:'雷暴天气',snowy:'雪花飘飘',night:'夜色静谧' };

  const hourly = [];
  for (let i = 0; i < 12; i++) {
    const h = (hour+i)%24;
    const hType = h>=6 && h<=18 ? type : (rng()>0.3 ? 'night' : type);
    hourly.push({ time:`${String(h).padStart(2,'0')}:00`, icon:W[hType]?.icon||W[type].icon, temp: Math.round(temp+(rng()-0.5)*5+(h>=12&&h<=15?2:-1)) });
  }

  const days = ['周日','周一','周二','周三','周四','周五','周六'];
  const forecast = [];
  for (let i = 1; i <= 7; i++) {
    const d = new Date(now); d.setDate(d.getDate()+i);
    const fType = types[Math.floor(rng()*types.length)];
    const fTemp = Math.round(baseTemp+(rng()-0.5)*8);
    forecast.push({ day: i===1?'明天':days[d.getDay()], date:`${d.getMonth()+1}/${d.getDate()}`, icon:W[fType].icon, hi:fTemp+Math.round(rng()*4+2), lo:fTemp-Math.round(rng()*4+2) });
  }

  return { type, wt, temp, hi, lo, humidity, wind, windDir, aqi, uv, pressure, visibility, desc: descs[type]||type, hourly, forecast };
}

let currentCity = 0, currentData = null;

function renderCityBar() {
  const bar = document.getElementById('cityBar');
  bar.innerHTML = CITIES.map((c,i) =>
    `<div class="city-chip ${i===currentCity?'active':''}" data-idx="${i}">${c.name}</div>`
  ).join('');
  bar.querySelectorAll('.city-chip').forEach(el => el.addEventListener('click', () => switchCity(+el.dataset.idx)));
}

function switchCity(idx) {
  currentCity = idx;
  currentData = genWeather(idx);
  renderCityBar();
  renderCurrent();
  renderDetails();
  renderHourly();
  renderForecast();
  applyWeatherEffects(currentData);
  initParticles(currentData.wt.canvas);
}

function renderCurrent() {
  const d = currentData;
  document.getElementById('curIcon').textContent = d.wt.icon;
  document.getElementById('curCity').textContent = CITIES[currentCity].name;
  document.getElementById('curTemp').innerHTML = `${d.temp}<span>°C</span>`;
  document.getElementById('curDesc').textContent = d.desc + ` · H:${d.hi}° L:${d.lo}°`;
}

function renderDetails() {
  const d = currentData;
  const aqiLabel = d.aqi<=50?'优':d.aqi<=100?'良':d.aqi<=150?'轻度':'中度';
  const items = [
    { icon:'💧', label:'湿度', val:`${d.humidity}%` },
    { icon:'🌬️', label:'风力', val:`${d.windDir} ${d.wind}km/h` },
    { icon:'🌡️', label:'气压', val:`${d.pressure} hPa` },
    { icon:'👁️', label:'能见度', val:`${d.visibility} km` },
    { icon:'☀️', label:'紫外线', val: d.uv.toString() },
    { icon:'💨', label:'空气质量', val:`AQI ${d.aqi} (${aqiLabel})` },
  ];
  document.getElementById('detailsGrid').innerHTML = items.map(it =>
    `<div class="detail-card">
      <div class="icon">${it.icon}</div>
      <div class="val">${it.val}</div>
      <div class="label">${it.label}</div>
    </div>`
  ).join('');
}

function renderHourly() {
  document.getElementById('hourlyRow').innerHTML = currentData.hourly.map(h =>
    `<div class="hourly-card">
      <div class="htime">${h.time}</div>
      <div class="hicon">${h.icon}</div>
      <div class="htemp">${h.temp}°</div>
    </div>`
  ).join('');
}

function renderForecast() {
  document.getElementById('forecastRow').innerHTML = currentData.forecast.map(f =>
    `<div class="forecast-card">
      <div class="day">${f.day}<br><small>${f.date}</small></div>
      <div class="ficon">${f.icon}</div>
      <div class="ftemp">${f.hi}° <span class="lo">${f.lo}°</span></div>
    </div>`
  ).join('');
}

function applyWeatherEffects(d) {
  document.body.className = d.wt.sky;
  document.getElementById('cloudLayer').classList.toggle('visible', d.wt.cloud);
  canvasType = d.wt.canvas;
  if (canvasType==='storm') startLightning(); else stopLightning();
}

// ---- CANVAS ANIMATIONS ----
const canvas = document.getElementById('weatherCanvas');
const ctx = canvas.getContext('2d');
let canvasType = 'rain', W, H;

function resize() { W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
window.addEventListener('resize', resize); resize();

class Raindrop {
  constructor(h) { this.reset(h); }
  reset(h) { this.x=Math.random()*W; this.y=Math.random()*-H; this.speed=h?18+Math.random()*14:8+Math.random()*8; this.len=h?22+Math.random()*18:12+Math.random()*10; this.opacity=0.2+Math.random()*0.4; this.w=h?2:1+Math.random(); }
  update(h) { this.y+=this.speed; this.x-=1.5; if(this.y>H) this.reset(h); }
  draw() {
    ctx.beginPath();
    ctx.strokeStyle=`rgba(180,200,230,${this.opacity})`;
    ctx.lineWidth=this.w;
    ctx.moveTo(this.x,this.y);
    ctx.lineTo(this.x-2,this.y-this.len);
    ctx.stroke();
  }
}

class Snowflake {
  constructor() { this.reset(); }
  reset() { this.x=Math.random()*W; this.y=Math.random()*-H; this.r=2+Math.random()*4; this.speed=1+Math.random()*2; this.wind=-0.5+Math.random(); this.wobble=Math.random()*Math.PI*2; this.opacity=0.5+Math.random()*0.5; }
  update() { this.wobble+=0.02; this.y+=this.speed; this.x+=this.wind+Math.sin(this.wobble)*0.8; if(this.y>H+10||this.x<-20||this.x>W+20) this.reset(); }
  draw() { ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fillStyle=`rgba(255,255,255,${this.opacity})`; ctx.fill(); }
}

class Star {
  reset() { this.x=Math.random()*W; this.y=Math.random()*H*0.7; this.r=0.5+Math.random()*2; this.ts=0.01+Math.random()*0.03; this.ph=Math.random()*Math.PI*2; }
  draw(t) { const o=0.3+0.7*Math.abs(Math.sin(t*this.ts+this.ph)); ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fillStyle=`rgba(255,255,240,${o})`; ctx.fill(); }
}

class Puddle {
  constructor() { this.x=Math.random()*W; this.y=H-Math.random()*60; this.r=0; this.maxR=4+Math.random()*8; this.speed=0.3+Math.random()*0.4; this.opacity=0.5; }
  update() { this.r+=this.speed; this.opacity-=0.008; if(this.opacity<=0) { this.r=0;this.opacity=0.5;this.x=Math.random()*W;this.y=H-Math.random()*40;this.maxR=4+Math.random()*8; } }
  draw() { ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.strokeStyle=`rgba(180,200,230,${this.opacity})`; ctx.lineWidth=1; ctx.stroke(); }
}

let stars=[], puddles=[], raindrops=[], snowflakes=[];

function initParticles(type) {
  stars=[]; puddles=[]; raindrops=[]; snowflakes=[];
  switch(type) {
    case 'rain':
      for(let i=0;i<180;i++) raindrops.push(new Raindrop(false));
      for(let i=0;i<30;i++) puddles.push(new Puddle()); break;
    case 'heavyRain':
      for(let i=0;i<350;i++) raindrops.push(new Raindrop(true));
      for(let i=0;i<40;i++) puddles.push(new Puddle()); break;
    case 'snow':
      for(let i=0;i<200;i++) snowflakes.push(new Snowflake()); break;
    case 'storm':
      for(let i=0;i<400;i++) raindrops.push(new Raindrop(true));
      for(let i=0;i<50;i++) puddles.push(new Puddle()); break;
    case 'stars': case 'sunny': case 'cloudy':
      for(let i=0;i<150;i++) { const s=new Star(); s.reset(); stars.push(s); } break;
  }
}

class ShootingStar {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * W;
    this.y = Math.random() * H * 0.3;
    this.len = 80 + Math.random() * 60;
    this.speed = 8 + Math.random() * 6;
    this.angle = Math.PI / 4 + (Math.random() - 0.5) * 0.3;
    this.opacity = 1;
    this.alive = true;
  }
  update() {
    this.x += Math.cos(this.angle) * this.speed;
    this.y += Math.sin(this.angle) * this.speed;
    this.opacity -= 0.015;
    if (this.opacity <= 0 || this.x > W + 50 || this.y > H + 50) this.alive = false;
  }
  draw() {
    const ex = this.x - Math.cos(this.angle) * this.len;
    const ey = this.y - Math.sin(this.angle) * this.len;
    const grad = ctx.createLinearGradient(this.x, this.y, ex, ey);
    grad.addColorStop(0, `rgba(255,255,255,${this.opacity})`);
    grad.addColorStop(1, `rgba(255,255,255,0)`);
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(ex, ey);
    ctx.strokeStyle = grad;
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

let shootingStars = [];
let lastShot = 0;

let animFrame;
let frameCounter = 0;

function animate() {
  ctx.clearRect(0, 0, W, H);
  frameCounter++;

  switch(canvasType) {
    case 'rain':
      raindrops.forEach(d => { d.update(false); d.draw(); });
      puddles.forEach(p => { p.update(); p.draw(); });
      break;
    case 'heavyRain':
      raindrops.forEach(d => { d.update(true); d.draw(); });
      puddles.forEach(p => { p.update(); p.draw(); });
      break;
    case 'snow':
      snowflakes.forEach(s => { s.update(); s.draw(); });
      break;
    case 'storm':
      raindrops.forEach(d => { d.update(true); d.draw(); });
      puddles.forEach(p => { p.update(); p.draw(); });
      break;
    case 'stars': case 'sunny': case 'cloudy':
      stars.forEach(s => s.draw(frameCounter));
      // shooting stars in star mode
      if (canvasType === 'stars') {
        if (frameCounter - lastShot > 180 && Math.random() < 0.015) {
          shootingStars.push(new ShootingStar());
          lastShot = frameCounter;
        }
        shootingStars.forEach(ss => { ss.update(); ss.draw(); });
        shootingStars = shootingStars.filter(ss => ss.alive);
      }
      break;
  }

  animFrame = requestAnimationFrame(animate);
}
animate();

let lightningInterval = null;
function startLightning() {
  stopLightning();
  const el = document.getElementById('lightning');
  lightningInterval = setInterval(() => {
    if (Math.random() > 0.5) {
      el.style.opacity = '0.85';
      setTimeout(() => { el.style.opacity = '0'; }, 80);
      setTimeout(() => { el.style.opacity = '0.5'; setTimeout(() => { el.style.opacity = '0'; }, 60); }, 180);
    }
  }, 2500);
}
function stopLightning() {
  if (lightningInterval) { clearInterval(lightningInterval); lightningInterval = null; }
  document.getElementById('lightning').style.opacity = '0';
}

// time
function updateTime() {
  const now = new Date();
  const opts = { weekday:'short', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' };
  document.getElementById('timeBadge').textContent = now.toLocaleDateString('zh-CN', opts);
}
setInterval(updateTime, 1000); updateTime();

// auto night
const _h = new Date().getHours();

// ---- INIT ----
switchCity(0);
if (_h < 6 || _h > 19) {
  currentData.wt = W.night;
  currentData.type = 'night';
  currentData.desc = '夜色静谧';
  renderCurrent();
  applyWeatherEffects(currentData);
  initParticles('stars');
}
</script>
