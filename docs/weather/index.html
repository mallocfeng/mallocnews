<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天气 · Immersive Forecast</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans SC', sans-serif; overflow: hidden; background: #0a0e1a; color: #fff; }
  #canvas3d { position: fixed; top: 0; left: 0; z-index: 0; }
  .ui-layer { position: relative; z-index: 10; width: 100%; height: 100vh; display: flex; flex-direction: column; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px 0; flex-shrink: 0; }
  .logo { font-size: 1.1rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; opacity: 0.5; }
  .clock { font-size: 0.85rem; opacity: 0.5; font-variant-numeric: tabular-nums; }
  .city-nav { display: flex; gap: 6px; padding: 16px 24px 0; overflow-x: auto; flex-shrink: 0; }
  .city-btn { padding: 6px 18px; border-radius: 20px; border: 1.5px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.65); font-size: 0.88rem; font-weight: 500; cursor: pointer; white-space: nowrap; transition: all 0.4s ease; font-family: inherit; }
  .city-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
  .city-btn.active { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.4); color: #fff; box-shadow: 0 0 20px rgba(255,255,255,0.08); }
  .main-content { flex: 1; display: flex; flex-direction: column; padding: 12px 24px 20px; justify-content: center; }
  .hero { display: flex; align-items: flex-end; gap: 16px; margin-bottom: 8px; }
  .hero-temp { font-size: 7vw; font-weight: 200; line-height: 0.9; max-width: 340px; }
  .hero-unit { font-size: 2vw; vertical-align: super; opacity: 0.5; margin-left: -2px; }
  .hero-meta { display: flex; flex-direction: column; gap: 4px; padding-bottom: 14px; }
  .hero-city { font-size: 2vw; font-weight: 700; }
  .hero-desc { font-size: 1vw; opacity: 0.55; font-weight: 300; }
  .metrics { display: flex; gap: 24px; flex-wrap: wrap; padding: 20px 0; }
  .metric { display: flex; flex-direction: column; gap: 2px; }
  .metric-val { font-size: 1.3rem; font-weight: 700; }
  .metric-label { font-size: 0.72rem; opacity: 0.4; text-transform: uppercase; letter-spacing: 1px; }
  .divider { height: 1px; background: rgba(255,255,255,0.08); margin: 8px 0 16px; }
  .forecast-section { display: flex; flex-direction: column; gap: 16px; flex-shrink: 0; }
  .section-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.35; }
  .hourly-scroll { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 4px; }
  .hourly-scroll::-webkit-scrollbar { height: 2px; }
  .hourly-scroll::-webkit-scrollbar-track { background: transparent; }
  .hourly-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
  .h-item { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 52px; }
  .h-item .ht { font-size: 0.75rem; opacity: 0.45; }
  .h-item .hi { font-size: 1.1rem; }
  .h-item .hv { font-size: 0.95rem; font-weight: 600; }
  .daily-scroll { display: flex; gap: 12px; overflow-x: auto; }
  .daily-scroll::-webkit-scrollbar { height: 2px; }
  .daily-scroll::-webkit-scrollbar-track { background: transparent; }
  .daily-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }
  .d-item { display: flex; align-items: center; gap: 12px; min-width: 200px; padding: 10px 0; }
  .d-item .dl { font-size: 0.85rem; min-width: 36px; opacity: 0.6; }
  .d-item .di { font-size: 1.1rem; min-width: 28px; text-align: center; }
  .d-bar-wrap { flex: 1; display: flex; align-items: center; gap: 8px; }
  .d-bar-outer { flex: 1; height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; position: relative; overflow: hidden; }
  .d-bar-inner { position: absolute; top: 0; height: 100%; border-radius: 2px; background: linear-gradient(90deg, #5b8cf7, #f7c948); }
  .d-item .dlo { font-size: 0.8rem; opacity: 0.4; min-width: 28px; text-align: right; }
  .d-item .dhi { font-size: 0.8rem; font-weight: 700; min-width: 28px; }
  .error-msg { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 100; text-align: center; background: rgba(0,0,0,0.8); padding: 24px 36px; border-radius: 16px; display: none; }
  .error-msg.show { display: block; }
  @media (max-width: 600px) { .hero-temp { font-size: 18vw; } .hero-unit { font-size: 8vw; } .hero-city { font-size: 6vw; } .hero-desc { font-size: 3.5vw; } .metric-val { font-size: 1rem; } .top-bar { padding: 12px 16px 0; } .city-nav { padding: 12px 16px 0; } .main-content { padding: 8px 16px 12px; } }
</style>
</head>
<body>

<canvas id="canvas3d"></canvas>

<div class="error-msg" id="errorMsg">
  <div style="font-size:1.2rem;font-weight:700;margin-bottom:8px">加载失败</div>
  <div style="opacity:0.6" id="errorText">请检查网络连接后刷新页面</div>
</div>

<div class="ui-layer">
  <div class="top-bar">
    <div class="logo">天气预报</div>
    <div class="clock" id="clock"></div>
  </div>
  <div class="city-nav" id="cityNav"></div>
  <div class="main-content">
    <div class="hero">
      <div class="hero-temp"><span id="heroTemp">--</span><span class="hero-unit">°C</span></div>
      <div class="hero-meta">
        <div class="hero-city" id="heroCity"></div>
        <div class="hero-desc" id="heroDesc"></div>
      </div>
    </div>
    <div class="metrics" id="metrics"></div>
    <div class="divider"></div>
    <div class="forecast-section">
      <div>
        <div class="section-label" style="margin-bottom:10px">逐时</div>
        <div class="hourly-scroll" id="hourlyScroll"></div>
      </div>
      <div>
        <div class="section-label" style="margin-bottom:6px">7 日</div>
        <div class="daily-scroll" id="dailyScroll"></div>
      </div>
    </div>
  </div>
</div>

<!-- external libs (local) -->
<script src="three.min.js"></script>
<script src="gsap.min.js"></script>

<script>
// ============================================================
// CONFIG
// ============================================================
const CITIES = [
  { name:'苏州', lat:31.30, lon:120.58 },
  { name:'北京', lat:39.90, lon:116.41 },
  { name:'上海', lat:31.23, lon:121.47 },
  { name:'广州', lat:23.13, lon:113.26 },
  { name:'深圳', lat:22.54, lon:114.06 },
  { name:'成都', lat:30.57, lon:104.07 },
  { name:'杭州', lat:30.25, lon:120.17 },
  { name:'南京', lat:32.06, lon:118.80 },
  { name:'武汉', lat:30.59, lon:114.31 },
  { name:'西安', lat:34.27, lon:108.94 },
];

const WMO_TO_TYPE = {
  0:'clear', 1:'clear', 2:'cloudy', 3:'overcast',
  45:'fog', 48:'fog', 51:'drizzle', 53:'drizzle', 55:'drizzle',
  56:'sleet', 57:'sleet', 61:'rain', 63:'rain', 65:'heavyRain',
  66:'sleet', 67:'sleet', 71:'snow', 73:'snow', 75:'heavySnow',
  77:'snow', 80:'rain', 81:'rain', 82:'heavyRain',
  85:'snow', 86:'heavySnow', 95:'storm', 96:'storm', 99:'storm',
};

const TYPE_INFO = {
  clear:      { icon:'☀️', label:'晴', scene:'clear' },
  cloudy:     { icon:'⛅', label:'多云', scene:'cloudy' },
  overcast:   { icon:'☁️', label:'阴', scene:'overcast' },
  fog:        { icon:'🌫️', label:'雾', scene:'fog' },
  drizzle:    { icon:'🌦️', label:'小雨', scene:'rain' },
  rain:       { icon:'🌧️', label:'雨', scene:'rain' },
  heavyRain:  { icon:'🌧️', label:'大雨', scene:'heavyRain' },
  sleet:      { icon:'🌨️', label:'雨夹雪', scene:'sleet' },
  snow:       { icon:'🌨️', label:'雪', scene:'snow' },
  heavySnow:  { icon:'❄️', label:'大雪', scene:'heavySnow' },
  storm:      { icon:'⛈️', label:'雷暴', scene:'storm' },
};

// ============================================================
// WAIT FOR LIBRARIES
// ============================================================
let THREE, gsapLib;
let initDone = false;

function waitForLibs() {
  if (typeof THREE !== 'undefined' && typeof gsap !== 'undefined') {
    if (!initDone) { initDone = true; run(); }
    return;
  }
  if (setTimeout.__libWait > 20) {
    document.getElementById('errorMsg').classList.add('show');
    document.getElementById('errorText').textContent = 'CDN 资源加载超时，请检查网络或刷新页面';
    return;
  }
  setTimeout.__libWait = (setTimeout.__libWait || 0) + 1;
  setTimeout(waitForLibs, 300);
}

function run() {
  THREE = window.THREE;
  gsapLib = window.gsap;

  // ============================================================
  // SCENE
  // ============================================================
  const canvasEl = document.getElementById('canvas3d');
  const renderer = new THREE.WebGLRenderer({ canvas: canvasEl, antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0, 2, 0);
  camera.lookAt(0, 1, -10);

  // ============================================================
  // BACKGROUNDS
  // ============================================================
  const SCENE_BG = {
    clear: 0x1a4a7a, cloudy: 0x3a3f5a, overcast: 0x2a2e42, fog: 0x4a4f5a,
    rain: 0x0f1a28, heavyRain: 0x0a0f1a, snow: 0x5a6578, heavySnow: 0x4a5568,
    sleet: 0x3a4558, storm: 0x060a12,
  };

  function setBg(color) {
    scene.background = new THREE.Color(color);
    scene.fog = new THREE.FogExp2(color, 0.008);
  }
  setBg(0x1a4a7a);

  // ============================================================
  // TEXTURES
  // ============================================================
  function softTexture(size) {
    const c = document.createElement('canvas'); c.width = c.height = size;
    const g = c.getContext('2d');
    const gr = g.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2);
    gr.addColorStop(0,'rgba(255,255,255,1)');
    gr.addColorStop(0.5,'rgba(255,255,255,0.8)');
    gr.addColorStop(1,'rgba(255,255,255,0)');
    g.fillStyle = gr; g.fillRect(0,0,size,size);
    return new THREE.CanvasTexture(c);
  }

  function lineTexture() {
    const c = document.createElement('canvas'); c.width = 8; c.height = 128;
    const g = c.getContext('2d');
    const gr = g.createLinearGradient(4,0,4,128);
    gr.addColorStop(0,'rgba(200,210,240,1)');
    gr.addColorStop(0.7,'rgba(200,210,240,0.4)');
    gr.addColorStop(1,'rgba(200,210,240,0)');
    g.fillStyle = gr; g.fillRect(0,0,8,128);
    return new THREE.CanvasTexture(c);
  }

  const softTex = softTexture(64);
  const lineTex = lineTexture();

  // ============================================================
  // RAIN
  // ============================================================
  const rainCount = 24000;
  const rainGeo = new THREE.BufferGeometry();
  const rainPos = new Float32Array(rainCount * 3);
  const rainVel = new Float32Array(rainCount);
  for (let i = 0; i < rainCount; i++) {
    rainPos[i*3]=(Math.random()-0.5)*120; rainPos[i*3+1]=Math.random()*80+5;
    rainPos[i*3+2]=(Math.random()-0.5)*120; rainVel[i]=0.6+Math.random()*1.2;
  }
  rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPos,3));
  const rainMat = new THREE.PointsMaterial({ map:lineTex, size:1.2, transparent:true, opacity:0.65, blending:THREE.AdditiveBlending, depthWrite:false, sizeAttenuation:true });
  const rain = new THREE.Points(rainGeo, rainMat);
  rain.visible = false; scene.add(rain);

  function tickRain() {
    const a = rainGeo.attributes.position.array;
    for (let i=0; i<rainCount; i++) { a[i*3+1]-=rainVel[i]*1.5; a[i*3]-=0.05;
      if(a[i*3+1]<-2) { a[i*3]=(Math.random()-0.5)*120; a[i*3+1]=80+Math.random()*10; a[i*3+2]=(Math.random()-0.5)*120; }
    }
    rainGeo.attributes.position.needsUpdate = true;
  }

  // HEAVY RAIN
  const hRainCount = 35000;
  const hRainGeo = new THREE.BufferGeometry();
  const hRainPos = new Float32Array(hRainCount*3);
  const hRainVel = new Float32Array(hRainCount);
  for (let i=0; i<hRainCount; i++) {
    hRainPos[i*3]=(Math.random()-0.5)*140; hRainPos[i*3+1]=Math.random()*80+5;
    hRainPos[i*3+2]=(Math.random()-0.5)*140; hRainVel[i]=0.9+Math.random()*1.4;
  }
  hRainGeo.setAttribute('position', new THREE.BufferAttribute(hRainPos,3));
  const hRainMat = new THREE.PointsMaterial({ map:lineTex, size:1.5, transparent:true, opacity:0.75, blending:THREE.AdditiveBlending, depthWrite:false, sizeAttenuation:true });
  const hRain = new THREE.Points(hRainGeo, hRainMat);
  hRain.visible = false; scene.add(hRain);

  function tickHRain() {
    const a = hRainGeo.attributes.position.array;
    for (let i=0; i<hRainCount; i++) { a[i*3+1]-=hRainVel[i]*1.8; a[i*3]-=0.1;
      if(a[i*3+1]<-2) { a[i*3]=(Math.random()-0.5)*140; a[i*3+1]=80+Math.random()*10; a[i*3+2]=(Math.random()-0.5)*140; }
    }
    hRainGeo.attributes.position.needsUpdate = true;
  }

  // SNOW
  const snowCount = 12000;
  const snowGeo = new THREE.BufferGeometry();
  const snowPos = new Float32Array(snowCount*3);
  const snowPhase = new Float32Array(snowCount);
  for (let i=0; i<snowCount; i++) {
    snowPos[i*3]=(Math.random()-0.5)*100; snowPos[i*3+1]=Math.random()*60+5;
    snowPos[i*3+2]=(Math.random()-0.5)*100; snowPhase[i]=Math.random()*Math.PI*2;
  }
  snowGeo.setAttribute('position', new THREE.BufferAttribute(snowPos,3));
  const snowMat = new THREE.PointsMaterial({ map:softTex, size:3, transparent:true, opacity:0.85, blending:THREE.AdditiveBlending, depthWrite:false, sizeAttenuation:true, color:0xeef3ff });
  const snow = new THREE.Points(snowGeo, snowMat);
  snow.visible = false; scene.add(snow);
  let snowT = 0;

  function tickSnow() {
    snowT += 0.016;
    const a = snowGeo.attributes.position.array;
    for (let i=0; i<snowCount; i++) {
      a[i*3]+=Math.sin(snowT+snowPhase[i])*0.04+0.02;
      a[i*3+1]-=0.15;
      a[i*3+2]+=Math.cos(snowT+snowPhase[i]*0.7)*0.03;
      if(a[i*3+1]<-2) { a[i*3]=(Math.random()-0.5)*100; a[i*3+1]=60+Math.random()*10; a[i*3+2]=(Math.random()-0.5)*100; }
    }
    snowGeo.attributes.position.needsUpdate = true;
  }

  // FLOATING
  const floatCount = 200;
  const floatGeo = new THREE.BufferGeometry();
  const floatPos = new Float32Array(floatCount*3);
  for (let i=0; i<floatCount; i++) {
    floatPos[i*3]=(Math.random()-0.5)*80;
    floatPos[i*3+1]=Math.random()*40+2;
    floatPos[i*3+2]=-30+(Math.random()-0.5)*60;
  }
  floatGeo.setAttribute('position', new THREE.BufferAttribute(floatPos,3));
  const floatMat = new THREE.PointsMaterial({ map:softTex, size:3, transparent:true, opacity:0.25, depthWrite:false, sizeAttenuation:true });
  const floating = new THREE.Points(floatGeo, floatMat);
  floating.visible = false; scene.add(floating);

  function tickFloat(t) {
    const a = floatGeo.attributes.position.array;
    for (let i=0; i<floatCount; i++) {
      a[i*3]+=Math.sin(t*0.001+i)*0.01;
      a[i*3+1]+=Math.cos(t*0.0008+i*0.5)*0.008;
    }
    floatGeo.attributes.position.needsUpdate = true;
  }

  // GROUND
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(200,200),
    new THREE.MeshStandardMaterial({ color:0x1a1a2a, transparent:true, opacity:0.3, roughness:0.8 })
  );
  ground.rotation.x = -Math.PI/2; ground.position.y = -3;
  scene.add(ground);

  // CLOUDS
  const cloudGroup = new THREE.Group();
  scene.add(cloudGroup);
  cloudGroup.visible = false;
  const cloudMat = new THREE.MeshStandardMaterial({ color:0x8899bb, transparent:true, opacity:0.12, roughness:1 });
  for (let i=0; i<20; i++) {
    const r = 8+Math.random()*18;
    const m = new THREE.Mesh(new THREE.SphereGeometry(r,8,6), cloudMat.clone());
    m.material.opacity = 0.04+Math.random()*0.1;
    m.position.set((Math.random()-0.5)*120, 25+Math.random()*25, -20+(Math.random()-0.5)*80);
    m.scale.set(1, 0.35+Math.random()*0.2, 1);
    cloudGroup.add(m);
  }

  // ============================================================
  // SCENE SWITCH
  // ============================================================
  const fogDensities = { clear:0.006, cloudy:0.009, overcast:0.012, fog:0.03, rain:0.01, heavyRain:0.015, snow:0.008, heavySnow:0.01, sleet:0.009, storm:0.018 };

  function switchScene(type) {
    const t = TYPE_INFO[type]; if (!t) return;
    const s = t.scene;

    rain.visible = (s==='rain');
    hRain.visible = (s==='heavyRain');
    snow.visible = (s==='snow'||s==='heavySnow');
    cloudGroup.visible = (s==='cloudy'||s==='overcast'||s==='fog'||s==='storm');
    floating.visible = false;

    setBg(SCENE_BG[s] || 0x1a4a7a);
    scene.fog.density = fogDensities[s] || 0.008;

    if (floating.visible && !cloudGroup.visible && (s==='clear'||s==='storm')) {
      floating.visible = true;
    }
  }

  // ============================================================
  // API
  // ============================================================
  async function fetchWeather(city) {
    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,wind_direction_10m,pressure_msl,visibility&hourly=weather_code,temperature_2m&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=8`);
    if (!res.ok) throw new Error(res.status);
    return res.json();
  }

  // ============================================================
  // RENDER
  // ============================================================
  const windDirs = ['北','东北','东','东南','南','西南','西','西北'];
  function dirToLabel(d) { return windDirs[(Math.round(d/22.5)+1)%8]+'风'; }
  function formatTime(iso) { return iso.slice(11,16).replace(':00',':00'); }
  function formatDay(s) { const d=new Date(s+'T00:00:00'); return ['周日','周一','周二','周三','周四','周五','周六'][d.getDay()]; }

  function wmoToInfo(code) { return TYPE_INFO[WMO_TO_TYPE[code]] || { icon:'🌡️', label:'未知' }; }

  let currentCity = 0;

  function renderCities() {
    const nav = document.getElementById('cityNav');
    nav.innerHTML = CITIES.map((c,i) => `<button class="city-btn ${i===currentCity?'active':''}" data-i="${i}">${c.name}</button>`).join('');
    nav.querySelectorAll('.city-btn').forEach(b => b.addEventListener('click', () => loadCity(+b.dataset.i)));
  }

  async function loadCity(idx) {
    currentCity = idx;
    renderCities();

    try {
      const data = await fetchWeather(CITIES[idx]);
      renderData(CITIES[idx], data);
    } catch(e) {
      console.error(e);
      document.getElementById('heroCity').textContent = '请求失败 (' + e.message + ')';
    }
  }

  function renderData(city, data) {
    const info = wmoToInfo(data.current.weather_code);
    switchScene(data.current.weather_code || 0);

    // hero
    document.getElementById('heroCity').textContent = city.name;
    document.getElementById('heroDesc').textContent = info.label;
    const tempEl = document.getElementById('heroTemp');
    const val = Math.round(data.current.temperature_2m);
    if (gsapLib) {
      gsapLib.fromTo(tempEl, { scale:0.85, opacity:0.4 }, { scale:1, opacity:1, duration:0.6, ease:'back.out(1.4)' });
    }
    tempEl.textContent = val;

    // metrics
    const vis = data.current.visibility ? (data.current.visibility/1000).toFixed(1)+'km' : '--';
    document.getElementById('metrics').innerHTML =
      `<div class="metric"><span class="metric-val">💧 ${data.current.relative_humidity_2m}%</span><span class="metric-label">湿度</span></div>` +
      `<div class="metric"><span class="metric-val">💨 ${dirToLabel(data.current.wind_direction_10m)} ${Math.round(data.current.wind_speed_10m)}km/h</span><span class="metric-label">风力</span></div>` +
      `<div class="metric"><span class="metric-val">🌡️ ${Math.round(data.current.pressure_msl)}hPa</span><span class="metric-label">气压</span></div>` +
      `<div class="metric"><span class="metric-val">👁️ ${vis}</span><span class="metric-label">能见度</span></div>`;

    // hourly
    document.getElementById('hourlyScroll').innerHTML = data.hourly.time.slice(0,24).map((t,i) => {
      const h = wmoToInfo(data.hourly.weather_code[i]);
      return `<div class="h-item"><span class="ht">${t.slice(11,16).slice(0,4)+'00'}</span><span class="hi">${h.icon}</span><span class="hv">${Math.round(data.hourly.temperature_2m[i])}°</span></div>`;
    }).join('');

    // daily
    const temps = [];
    for (let i=1; i<=7; i++) temps.push({ lo: Math.round(data.daily.temperature_2m_min[i]), hi: Math.round(data.daily.temperature_2m_max[i]) });
    const gMin = Math.min(...temps.map(t=>t.lo)), gMax = Math.max(...temps.map(t=>t.hi)), range = gMax-gMin||1;

    let html = '';
    for (let i=1; i<=7; i++) {
      const hi = wmoToInfo(data.daily.weather_code[i]);
      const lo = Math.round(data.daily.temperature_2m_min[i]);
      const dhi = Math.round(data.daily.temperature_2m_max[i]);
      const lPct = ((lo-gMin)/range*100).toFixed(0);
      const wPct = ((dhi-lo)/range*100).toFixed(0);
      const label = i===1?'明天':formatDay(data.daily.time[i]);
      html += `<div class="d-item"><span class="dl">${label}</span><span class="di">${hi.icon}</span><div class="d-bar-wrap"><span class="dlo">${lo}°</span><div class="d-bar-outer"><div class="d-bar-inner" style="left:${lPct}%;width:${wPct}%"></div></div><span class="dhi">${dhi}°</span></div></div>`;
    }
    document.getElementById('dailyScroll').innerHTML = html;
  }

  // ============================================================
  // CLOCK
  // ============================================================
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleDateString('zh-CN', { month:'short', day:'numeric', weekday:'short', hour:'2-digit', minute:'2-digit' });
  }
  setInterval(updateClock, 1000); updateClock();

  // ============================================================
  // ANIMATE
  // ============================================================
  function animate() {
    requestAnimationFrame(animate);
    const t = performance.now();
    tickRain(); tickHRain(); tickSnow(); tickFloat(t);
    camera.position.x = Math.sin(t*0.0002)*0.5;
    camera.position.y = 2+Math.cos(t*0.00015)*0.3;
    // animate clouds
    cloudGroup.children.forEach((m,i) => { m.position.x+=0.02+i*0.003; if(m.position.x>65) m.position.x=-65; });
    renderer.render(scene, camera);
  }
  animate();

  // resize
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // init
  loadCity(0);
}

// start
waitForLibs();
</script>
</body>
</html>
